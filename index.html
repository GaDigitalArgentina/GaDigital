                        <td style={{padding:"12px 10px",maxWidth:240,background:prodBg,borderRadius:4}}>
                          <div style={{display:"flex",alignItems:"center",gap:6}}>
                            <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",fontFamily:"'Sora',sans-serif",fontSize:13,color:prodColor,fontWeight:row.llegado||row.enMiami||row.pedidoOnline?700:500,flex:1}} title={row.desc}>{row.desc}</div>
                            {row.photoUrl && <PhotoTooltip url={row.photoUrl}/>}
                          </div>
                          <div style={{fontSize:10,color:"#1f2937",fontWeight:700,marginTop:2}}>{row.date}</div>
                        </td>
                        <td style={{padding:"8px 10px",textAlign:"right"}}>
                          <EditableCell
                            value={row.priceUSD!=null ? row.priceUSD : row.price}
                            color={row.priceUSD!=null?"#86efac":"#e2e8f0"}
                            prefix={row.priceUSD!=null?"U$D ":"$ "}
                            onSave={v=>{
                              const newPrice = row.priceUSD!=null ? (v||0)*ARS_TO_USD : (v||0);
                              patchItem(row.orderId,row.itemId,{
                                price:newPrice,
                                priceUSD:row.priceUSD!=null?(v||0):null
                              });
                            }}
                          />
                          {row.priceUSD!=null&&<div style={{fontSize:10,color:"#1f2937",fontWeight:700,marginTop:1}}>{ars(row.price)}</div>}
                        </td>
                        <td style={{padding:"8px 10px",textAlign:"right"}}>
                          <EditableCell
                            value={row.reservaUSD!=null ? row.reservaUSD : row.reserva}
                            color={row.reservaUSD!=null?"#6ee7b7":"#4ade80"}
                            prefix={row.reservaUSD!=null?"U$D ":"$ "}
                            onSave={v=>{
                              const newReserva = row.reservaUSD!=null ? (v||0)*ARS_TO_USD : (v||0);
                              patchItem(row.orderId,row.itemId,{
                                reserva:newReserva,
                                reservaUSD:row.reservaUSD!=null?(v||0):null
                              });
                            }}
                          />
                          {row.reservaUSD!=null&&<div style={{fontSize:10,color:"#1f2937",fontWeight:700,marginTop:1}}>{ars(row.reserva)}</div>}
                        </td>
                        <td style={{padding:"8px 10px",fontFamily:"'Sora',sans-serif",fontSize:12,color:row.pagado?"#4ade80":"#f87171",fontWeight:700,textAlign:"right",whiteSpace:"nowrap"}}>
                          {row.pagado?"✓":<span>U$D {(row.saldo/ARS_TO_USD).toFixed(0)}<span style={{display:"block",fontSize:10,color:"#1f2937",fontWeight:700,fontWeight:400}}>{ars(row.saldo)}</span></span>}
                        </td>
                        <td style={{padding:"8px 10px",textAlign:"right"}}>
                          <EditableCell value={row.costo} color="#fb923c" prefix="U$D "
                            onSave={v=>patchItem(row.orderId,row.itemId,{costo:v})}/>
                        </td>
                        <td style={{padding:"8px 10px",textAlign:"right"}}>
                          <EditableCell value={row.peso} color="#60a5fa" suffix=" kg"
                            onSave={v=>patchItem(row.orderId,row.itemId,{peso:v})}/>
                        </td>
                        <td style={{padding:"8px 10px",fontFamily:"'Sora',sans-serif",fontSize:12,color:"#f59e0b",textAlign:"right",whiteSpace:"nowrap"}}>
                          {row.costoEnvio!=null?`U$D ${row.costoEnvio.toFixed(2)}`:"—"}
                        </td>
                        <td style={{padding:"8px 10px",fontFamily:"'Sora',sans-serif",fontSize:12,textAlign:"right",whiteSpace:"nowrap",
                          color:row.ganancia!=null?(row.ganancia>0?"#34d399":"#f87171"):"#475569",fontWeight:row.ganancia!=null?700:400}}>
                          {row.ganancia!=null?<span>U$D {row.ganancia.toFixed(0)}</span>:"—"}
                        </td>
                        <td style={{padding:"6px 8px",textAlign:"center"}}>
                          <div style={{display:"flex",gap:4,flexWrap:"wrap",justifyContent:"center"}}>
                            <ToggleBtn active={row.llegado} activeColor="#fbbf24" label="ARG" icon="✈️"
                              onToggle={()=>patchItem(row.orderId,row.itemId,{llegado:!row.llegado, enMiami:false, pedidoOnline:false})}/>
                            <ToggleBtn active={row.enMiami} activeColor="#fb923c" label="Miami" icon="🌴"
                              onToggle={()=>patchItem(row.orderId,row.itemId,{enMiami:!row.enMiami, llegado:false, pedidoOnline:false})}/>
                            <ToggleBtn active={row.pedidoOnline} activeColor="#60a5fa" label="Online" icon="🛒"
                              onToggle={()=>patchItem(row.orderId,row.itemId,{pedidoOnline:!row.pedidoOnline, llegado:false, enMiami:false})}/>
                          </div>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{background:"rgba(167,139,250,0.08)",borderTop:"2px solid rgba(167,139,250,0.2)"}}>
                    <td colSpan={2} style={{padding:"10px",fontFamily:"'Sora',sans-serif",fontSize:12,color:"#a78bfa",fontWeight:700}}>TOTALES ({filtered.length})</td>
                    <td style={{padding:"10px",fontFamily:"'Sora',sans-serif",fontSize:12,color:"#0f172a",fontWeight:600,fontWeight:700,textAlign:"right"}}>{ars(totalVentas)}</td>
                    <td style={{padding:"10px",fontFamily:"'Sora',sans-serif",fontSize:12,color:"#4ade80",fontWeight:700,textAlign:"right"}}>{ars(totalCobrado)}</td>
                    <td style={{padding:"10px",fontFamily:"'Sora',sans-serif",fontSize:12,color:"#f87171",fontWeight:700,textAlign:"right"}}>U$D {(totalSaldos/ARS_TO_USD).toFixed(0)}<span style={{display:"block",fontSize:10,fontWeight:400}}>{ars(totalSaldos)}</span></td>
                    <td style={{padding:"10px",fontFamily:"'Sora',sans-serif",fontSize:12,color:"#fb923c",fontWeight:700,textAlign:"right"}}>{usd(totalCosto||null)}</td>
                    <td style={{padding:"10px",fontFamily:"'Sora',sans-serif",fontSize:12,color:"#60a5fa",fontWeight:700,textAlign:"right"}}>{totalPeso>0?`${totalPeso.toFixed(2)} kg`:"—"}</td>

          {showResumen && Object.keys(clientSummary).length>0&&(

              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:8}}>
                {Object.values(clientSummary).sort((a,b)=>b.saldo-a.saldo).map((c,i)=>(
                  <div key={i} style={{background:"#eef0f4",borderRadius:12,padding:"12px 16px",border:"1px solid #d4d8e2",display:"flex",alignItems:"center",gap:14}}>
                    <div style={{width:34,height:34,borderRadius:10,background:"linear-gradient(135deg,#1e1b4b,#3730a3)",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:800,color:"#a78bfa",flexShrink:0}}>
                      {c.name[0].toUpperCase()}

            </div>

    // ─── VIAJES VIEW ─────────────────────────────────────────────────────────────
    function ViajesView({ clients=[], orders=[], viajes=[], onAddViaje, onUpdateViaje, onDeleteViaje, onUpdateOrder }) {
      const [showNew, setShowNew] = useState(false);
      const [selected, setSelected] = useState(null); // viaje id detail view
      const [newName, setNewName] = useState("");
      const [newFecha, setNewFecha] = useState(today());

      const usd = n => n!=null?`U$D ${parseFloat(n).toFixed(0)}`:"—";

      // Get all items with llegado=true and their client info
      const allArrivedItems = clients.flatMap(client => {
        const cOrders = orders.filter(o=>o.clientId===client.id&&o.status!=="cancelado");
        return cOrders.flatMap(order=>order.items
          .filter(i=>i.llegado)
          .map(i=>({
            ...i, orderId:order.id, clientId:client.id,
            clientName:client.name, date:order.date,
            viajeId:i.viajeId||null
          }))
        );
      });

      // Assign item to viaje
      const assignToViaje = (orderId, itemId, viajeId) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        const updatedItems = order.items.map(i=>i.id===itemId?{...i,viajeId}:i);
        onUpdateOrder(orderId,{items:updatedItems});
      };

      const viajeItems = (viajeId) => allArrivedItems.filter(i=>i.viajeId===viajeId);
      const unassigned  = allArrivedItems.filter(i=>!i.viajeId);

      const viajeStats = (items) => {
        const totalARS    = items.reduce((a,i)=>a+i.price,0);
        const reservaARS  = items.reduce((a,i)=>a+i.reserva,0);
        const saldoARS    = items.reduce((a,i)=>a+(i.pagado?0:i.price-i.reserva),0);
        const costoUSD    = items.filter(i=>i.costo!=null).reduce((a,i)=>a+i.costo,0);
        const envioUSD    = items.filter(i=>i.peso!=null).reduce((a,i)=>a+i.peso*USD_POR_KG,0);
        const priceUSDtot = items.reduce((a,i)=>a+(i.priceUSD!=null?i.priceUSD:i.price/ARS_TO_USD),0);
        const ganancia    = priceUSDtot - costoUSD - envioUSD;
        return {totalARS,reservaARS,saldoARS,costoUSD,envioUSD,ganancia,count:items.length};
      };

      const sortedViajes = [...viajes].sort((a,b)=>b.createdAt?.localeCompare(a.createdAt||"")||0);
      const detailViaje  = selected ? viajes.find(v=>v.id===selected) : null;
      const detailItems  = selected ? viajeItems(selected) : [];
      const ds           = selected ? viajeStats(detailItems) : null;

      const s = { fontFamily:"'Sora',sans-serif" };
      const colH = { background:"#4f46e5",color:"#92400e",padding:"9px 12px",fontSize:10,textTransform:"uppercase",letterSpacing:0.7,fontWeight:700,whiteSpace:"nowrap",borderBottom:"2px solid rgba(251,191,36,0.3)" };

      if (selected && detailViaje) return (
        <div>
          {/* Header */}
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:22,flexWrap:"wrap"}}>
            <button onClick={()=>setSelected(null)} style={{background:"#e8eaf0",border:"1px solid #d4d8e2",borderRadius:10,padding:"8px 10px",cursor:"pointer",color:"#374151",display:"flex",alignItems:"center"}}>
              <Icon name="back" size={16}/>
            </button>
            <div style={{flex:1}}>
              <h2 style={{...s,fontSize:22,color:"#fbbf24",margin:0,fontWeight:800}}>✈️ {detailViaje.name}</h2>
              <div style={{...s,fontSize:12,color:"#374151",marginTop:2}}>Fecha de llegada: {detailViaje.fecha} · {detailItems.length} productos</div>
            </div>
            <button onClick={()=>{onDeleteViaje(detailViaje.id);setSelected(null);}} style={{background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:"#f87171",...s,fontSize:12,fontWeight:600}}>
              🗑️ Eliminar viaje
            </button>
          </div>

          {/* Stats */}
          <div style={{display:"flex",gap:8,marginBottom:20,flexWrap:"wrap"}}>
            {[
              {l:"Productos",v:ds.count,c:"#fbbf24"},
              {l:"Total ventas",v:ars(ds.totalARS),c:"#a78bfa"},
              {l:"Cobrado",v:ars(ds.reservaARS),c:"#22c55e"},
              {l:"Saldo pendiente",v:ars(ds.saldoARS),c:"#f87171"},
              {l:"Costo",v:usd(ds.costoUSD),c:"#fb923c"},
              {l:`Envío x${USD_POR_KG}`,v:usd(ds.envioUSD),c:"#f59e0b"},
              {l:"Ganancia",v:ds.ganancia>0?usd(ds.ganancia):"—",c:"#34d399"},
            ].map(({l,v,c})=>(
              <div key={l} style={{background:"#f5f6f9",border:`1px solid ${c}22`,borderRadius:10,padding:"9px 16px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
                <span style={{...s,fontSize:10,color:"#1f2937",fontWeight:700,textTransform:"uppercase",letterSpacing:0.7,fontWeight:600}}>{l}</span>
                <span style={{...s,fontSize:15,color:c,fontWeight:800}}>{v}</span>
              </div>
            ))}
          </div>

          {/* Products table */}
          {detailItems.length===0?(
            <div style={{textAlign:"center",padding:"40px",...s,color:"#374151",fontSize:14}}>
              <div style={{fontSize:36,marginBottom:10}}>📦</div>
              No hay productos asignados a este viaje todavía.<br/>
              <span style={{fontSize:12,color:"#374151"}}>Asigná productos desde la lista de abajo.</span>
            </div>
          ):(
            <div style={{borderRadius:14,border:"1px solid #d4d8e2",marginBottom:20,overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead><tr>
                  {["Clienta","Producto","Precio","Reserva","Saldo","Costo","Ganancia","Estado"].map((h,i)=>(
                    <th key={h} style={{...colH,textAlign:i>=2?"right":i===7?"center":"left"}}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {detailItems.sort((a,b)=>a.clientName.localeCompare(b.clientName,"es")).map((item,idx)=>{
                    const priceUSD = item.priceUSD!=null?item.priceUSD:item.price/ARS_TO_USD;
                    const costoEnvio = item.peso!=null?item.peso*USD_POR_KG:null;
                    const gan = (item.costo!=null||costoEnvio!=null)?priceUSD-(item.costo||0)-(costoEnvio||0):null;
                    return (
                      <tr key={item.id} style={{background:idx%2===0?"#eef0f4":"#f5f6f9",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
                        <td style={{padding:"10px 12px",...s,fontSize:13,color:"#0f172a",fontWeight:600,fontWeight:700,whiteSpace:"nowrap"}}>{item.clientName}</td>
                        <td style={{padding:"10px 12px",...s,fontSize:12,color:"#cbd5e1",maxWidth:240}}>
                          <div style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.desc}</div>
                        </td>
                        <td style={{padding:"10px 12px",...s,fontSize:12,color:"#0f172a",fontWeight:600,textAlign:"right",whiteSpace:"nowrap"}}>
                          {item.priceUSD!=null?`U$D ${item.priceUSD}`:ars(item.price)}
                        </td>
                        <td style={{padding:"10px 12px",...s,fontSize:12,color:"#4ade80",textAlign:"right",whiteSpace:"nowrap"}}>
                          {item.reservaUSD!=null?`U$D ${item.reservaUSD}`:ars(item.reserva)}
                        </td>
                        <td style={{padding:"10px 12px",...s,fontSize:12,color:item.pagado?"#4ade80":"#f87171",fontWeight:700,textAlign:"right",whiteSpace:"nowrap"}}>
                          {item.pagado?"✓":item.priceUSD!=null?`U$D ${((item.priceUSD||0)-(item.reservaUSD||item.reserva/ARS_TO_USD)).toFixed(0)}`:ars(item.price-item.reserva)}
                        </td>
                        <td style={{padding:"10px 12px",...s,fontSize:12,color:"#fb923c",textAlign:"right",whiteSpace:"nowrap"}}>
                          {item.costo!=null?`U$D ${item.costo}`:"—"}
                        </td>
                        <td style={{padding:"10px 12px",...s,fontSize:12,color:gan!=null?(gan>0?"#34d399":"#f87171"):"#475569",fontWeight:700,textAlign:"right",whiteSpace:"nowrap"}}>
                          {gan!=null?`U$D ${gan.toFixed(0)}`:"—"}
                        </td>
                        <td style={{padding:"10px 12px",textAlign:"center"}}>
                          <button onClick={()=>assignToViaje(item.orderId,item.id,null)} style={{...s,fontSize:10,fontWeight:700,background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:8,padding:"3px 8px",cursor:"pointer",color:"#f87171"}}>
                            Quitar
                          </button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          )}

          {/* Unassigned products to add */}
          {unassigned.length>0&&(
            <div>
              <h3 style={{...s,fontSize:14,color:"#374151",fontWeight:600,marginBottom:12}}>
                📦 Productos llegados sin asignar ({unassigned.length}) — tocá "Agregar" para incluirlos en este viaje
              </h3>
              <div style={{display:"grid",gap:6}}>
                {unassigned.sort((a,b)=>a.clientName.localeCompare(b.clientName,"es")).map(item=>(
                  <div key={item.id} style={{background:"#eef0f4",borderRadius:10,padding:"10px 14px",border:"1px solid #d4d8e2",display:"flex",alignItems:"center",gap:12}}>
                    <div style={{flex:1,minWidth:0}}>
                      <span style={{...s,fontSize:12,color:"#a78bfa",fontWeight:700,marginRight:10}}>{item.clientName}</span>
                      <span style={{...s,fontSize:12,color:"#cbd5e1"}}>{item.desc}</span>
                    </div>
                    <span style={{...s,fontSize:12,color:"#0f172a",fontWeight:600,marginRight:8,whiteSpace:"nowrap"}}>
                      {item.priceUSD!=null?`U$D ${item.priceUSD}`:ars(item.price)}
                    </span>
                    <button onClick={()=>assignToViaje(item.orderId,item.id,selected)} style={{...s,fontSize:11,fontWeight:700,background:"rgba(251,191,36,0.15)",border:"1px solid rgba(251,191,36,0.3)",borderRadius:8,padding:"5px 12px",cursor:"pointer",color:"#fbbf24",whiteSpace:"nowrap"}}>
                      + Agregar
                    </button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );

      // LIST VIEW
      return (
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
            <div>
              <h2 style={{...s,fontSize:22,color:"#fbbf24",margin:0,fontWeight:800}}>✈️ Cierres por Viaje</h2>
              <div style={{...s,fontSize:12,color:"#374151",marginTop:4}}>
                {viajes.length} viaje{viajes.length!==1?"s":""} · {unassigned.length} producto{unassigned.length!==1?"s":""} llegados sin asignar
              </div>
            </div>
            <button onClick={()=>setShowNew(true)} style={{...s,fontSize:13,fontWeight:700,background:"linear-gradient(135deg,#f59e0b,#d97706)",border:"none",borderRadius:10,padding:"10px 20px",cursor:"pointer",color:"#1c1917",display:"flex",alignItems:"center",gap:6}}>
              <Icon name="plus" size={14}/>Nuevo viaje
            </button>
          </div>

          {/* Unassigned alert */}
          {unassigned.length>0&&(
            <div style={{background:"rgba(251,191,36,0.08)",border:"1px solid rgba(251,191,36,0.2)",borderRadius:12,padding:"12px 16px",marginBottom:20,display:"flex",alignItems:"center",gap:12}}>
              <div style={{fontSize:20}}>📦</div>
              <div style={{...s,fontSize:13,color:"#fbbf24",fontWeight:600}}>
                {unassigned.length} producto{unassigned.length!==1?"s":""} llegado{unassigned.length!==1?"s":""} a ARG sin asignar a ningún viaje
              </div>
            </div>
          )}

          {/* Viajes list */}
          {viajes.length===0?(
            <div style={{textAlign:"center",padding:"60px",...s,color:"#374151"}}>
              <div style={{fontSize:48,marginBottom:14}}>✈️</div>
              <div style={{fontSize:15,fontWeight:600,color:"#374151",marginBottom:8}}>Aún no creaste ningún viaje</div>
              <button onClick={()=>setShowNew(true)} style={{background:"none",border:"1px dashed #334155",borderRadius:10,padding:"9px 20px",color:"#374151",cursor:"pointer",...s,fontSize:13}}>
                + Crear primer viaje
              </button>
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:12}}>
              {sortedViajes.map(viaje=>{
                const items = viajeItems(viaje.id);
                const st = viajeStats(items);
                return (
                  <div key={viaje.id} onClick={()=>setSelected(viaje.id)}

                    onMouseEnter={e=>{e.currentTarget.style.background="rgba(255,255,255,0.06)";e.currentTarget.style.border="1px solid rgba(251,191,36,0.4)"}}
                    onMouseLeave={e=>{e.currentTarget.style.background="rgba(255,255,255,0.03)";e.currentTarget.style.border="1px solid rgba(251,191,36,0.15)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:14}}>
                      <div>
                        <div style={{...s,fontSize:16,color:"#fbbf24",fontWeight:800,marginBottom:2}}>✈️ {viaje.name}</div>
                        <div style={{...s,fontSize:11,color:"#1f2937",fontWeight:700}}>Llegada: {viaje.fecha} · {st.count} productos</div>
                      </div>

                    </div>
                    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                      {[["Ventas",ars(st.totalARS),"#a78bfa"],["Cobrado",ars(st.reservaARS),"#22c55e"],["Saldo",ars(st.saldoARS),"#f87171"],["Ganancia",st.ganancia>0?usd(st.ganancia):"—","#34d399"]].map(([l,v,c])=>(
                        <div key={l} style={{background:"#f5f6f9",borderRadius:8,padding:"8px 10px"}}>
                          <div style={{...s,fontSize:9,color:"#1f2937",fontWeight:700,textTransform:"uppercase",letterSpacing:0.7,marginBottom:3}}>{l}</div>
                          <div style={{...s,fontSize:13,color:c,fontWeight:700}}>{v}</div>
                        </div>
                      ))}

                );
              })}

          {/* New viaje modal */}

                <Btn variant="ghost" onClick={()=>setShowNew(false)} style={{flex:1,justifyContent:"center"}}>Cancelar</Btn>
                <Btn variant="amber" disabled={!newName.trim()} onClick={()=>{if(newName.trim()){onAddViaje({name:newName.trim(),fecha:newFecha});setShowNew(false);setNewName("");setNewFecha(today());}}} style={{flex:2,justifyContent:"center"}}>
                  <Icon name="check" size={14}/>Crear viaje

    // ─── CATALOGO VIEW ───────────────────────────────────────────────────────────
    function CatalogoView({ catalogo, onAdd, onUpdate, onDelete }) {
      const [showForm, setShowForm] = useState(false);
      const [editing, setEditing] = useState(null);
      const [search, setSearch] = useState("");
      const [form, setForm] = useState({ name:"", price:"", priceUSD:false, costo:"", peso:"", photoUrl:"" });

      const resetForm = () => setForm({ name:"", price:"", priceUSD:false, costo:"", peso:"", photoUrl:"" });

      const openNew = () => { resetForm(); setEditing(null); setShowForm(true); };
      const openEdit = prod => {
        setForm({ name:prod.name, price:prod.priceUSD!=null?prod.priceUSD:prod.price||"", priceUSD:prod.priceUSD!=null, costo:prod.costo||"", peso:prod.peso||"", photoUrl:prod.photoUrl||"" });
        setEditing(prod.id); setShowForm(true);
      };

      const handleSave = () => {
        if (!form.name.trim()) return;
        const priceARS = form.priceUSD ? parseFloat(form.price)*ARS_TO_USD : parseFloat(form.price)||0;
        const item = { name:form.name.trim(), price:priceARS, priceUSD:form.priceUSD?parseFloat(form.price):null, costo:form.costo?parseFloat(form.costo):null, peso:form.peso?parseFloat(form.peso):null, photoUrl:form.photoUrl.trim() };
        if (editing) { onUpdate(editing, item); }
        else { onAdd(item); }
        setShowForm(false); resetForm(); setEditing(null);
      };

      const filtered = catalogo.filter(p=>p.name.toLowerCase().includes(search.toLowerCase()));
      const s = { fontFamily:"'Sora',sans-serif" };

      const imgSrc = url => {
        if (!url) return null;
        const g = url.match(/gyazo\.com\/([a-zA-Z0-9]+)/);
        if (g) return `https://i.gyazo.com/${g[1]}.png`;
        return url;
      };

      const CurrencyToggle = ({ isUSD, onToggle }) => (
        <div style={{display:"flex",background:"#e8eaf0",borderRadius:8,padding:2,gap:2}}>
          {[["ARS","$"],["USD","U$D"]].map(([cur,sym])=>(
            <button key={cur} onClick={()=>onToggle(cur==="USD")} style={{padding:"3px 10px",borderRadius:6,border:"none",cursor:"pointer",background:(isUSD===(cur==="USD"))?(cur==="USD"?"#16a34a":"#2563eb"):"transparent",color:(isUSD===(cur==="USD"))?"#fff":"#475569",...s,fontSize:11,fontWeight:700}}>
              {sym} {cur}
            </button>
          ))}
        </div>
      );

      return (
        <div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:20,flexWrap:"wrap",gap:12}}>
            <div>
              <h2 style={{...s,fontSize:22,color:"#60a5fa",margin:0,fontWeight:800}}>🛍️ Catálogo de productos</h2>
              <div style={{...s,fontSize:12,color:"#374151",marginTop:4}}>{catalogo.length} producto{catalogo.length!==1?"s":""} guardado{catalogo.length!==1?"s":""}</div>
            </div>
            <button onClick={openNew} style={{...s,fontSize:13,fontWeight:700,background:"linear-gradient(135deg,#3b82f6,#2563eb)",border:"none",borderRadius:10,padding:"10px 20px",cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",gap:6}}>
              <Icon name="plus" size={14}/>Nuevo producto
            </button>
          </div>

          {/* Search */}
          {catalogo.length>0&&(
            <div style={{position:"relative",marginBottom:20,maxWidth:400}}>
              <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#374151",pointerEvents:"none"}}><Icon name="search" size={14}/></div>
              <input style={{...inp,paddingLeft:36}} value={search} onChange={e=>setSearch(e.target.value)} placeholder="Buscar producto..."/>
            </div>
          )}

          {/* Grid */}
          {filtered.length===0?(
            <div style={{textAlign:"center",padding:"60px",...s,color:"#374151"}}>
              <div style={{fontSize:48,marginBottom:14}}>🛍️</div>
              <div style={{fontSize:15,fontWeight:600,color:"#374151",marginBottom:8}}>{catalogo.length===0?"Catálogo vacío":"Sin resultados"}</div>
              {catalogo.length===0&&<button onClick={openNew} style={{background:"none",border:"1px dashed #334155",borderRadius:10,padding:"9px 20px",color:"#374151",cursor:"pointer",...s,fontSize:13}}>+ Agregar primer producto</button>}
            </div>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))",gap:12}}>
              {filtered.map(prod=>(
                <div key={prod.id} style={{background:"#f5f6f9",borderRadius:16,overflow:"hidden",border:"1px solid rgba(96,165,250,0.12)"}}>
                  {/* Photo */}
                  {prod.photoUrl?(
                    <div style={{height:160,background:"#f5f6f9",overflow:"hidden",position:"relative"}}>
                      <img src={imgSrc(prod.photoUrl)} alt={prod.name} style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>{e.target.style.display="none";}}/>
                    </div>
                  ):(
                    <div style={{height:100,background:"rgba(96,165,250,0.05)",display:"flex",alignItems:"center",justifyContent:"center",color:"#374151",fontSize:32}}>🛍️</div>
                  )}
                  <div style={{padding:14}}>
                    <div style={{...s,fontSize:14,color:"#0f172a",fontWeight:800,marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{prod.name}</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                      <span style={{...s,fontSize:11,background:"rgba(96,165,250,0.1)",color:"#60a5fa",borderRadius:6,padding:"3px 8px",fontWeight:600}}>
                        {prod.priceUSD!=null?`U$D ${prod.priceUSD}`:ars(prod.price||0)}
                      </span>
                      {prod.costo!=null&&<span style={{...s,fontSize:11,background:"rgba(251,146,60,0.1)",color:"#fb923c",borderRadius:6,padding:"3px 8px",fontWeight:600}}>Costo U$D {prod.costo}</span>}
                      {prod.peso!=null&&<span style={{...s,fontSize:11,background:"rgba(96,165,250,0.08)",color:"#60a5fa",borderRadius:6,padding:"3px 8px"}}>{prod.peso}kg</span>}
                    </div>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={()=>openEdit(prod)} style={{flex:1,padding:"7px",background:"rgba(167,139,250,0.1)",border:"1px solid rgba(167,139,250,0.2)",borderRadius:8,cursor:"pointer",color:"#a78bfa",...s,fontSize:12,fontWeight:600}}>
                        ✏️ Editar
                      </button>
                      <button onClick={()=>onDelete(prod.id)} style={{padding:"7px 10px",background:"rgba(239,68,68,0.08)",border:"1px solid rgba(239,68,68,0.15)",borderRadius:8,cursor:"pointer",color:"#f87171",display:"flex",alignItems:"center"}}>
                        <Icon name="trash" size={13}/>
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Form modal */}
          {showForm&&(
            <Modal title={editing?"Editar producto":"Nuevo producto en catálogo"} onClose={()=>{setShowForm(false);resetForm();setEditing(null);}}>
              <div style={{marginBottom:12}}>
                <label style={lbl}>Nombre del producto *</label>
                <input style={inp} value={form.name} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Ej: Remera Nike oversize" autoFocus/>
              </div>
              <div style={{marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                  <label style={{...lbl,marginBottom:0}}>Precio base</label>
                  <CurrencyToggle isUSD={form.priceUSD} onToggle={v=>setForm(p=>({...p,priceUSD:v}))}/>
                </div>
                <div style={{position:"relative"}}>
                  <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#374151",...s,fontSize:12,fontWeight:700,pointerEvents:"none"}}>{form.priceUSD?"U$D":"$"}</div>
                  <input style={{...inp,paddingLeft:36}} type="number" value={form.price} onChange={e=>setForm(p=>({...p,price:e.target.value}))} placeholder={form.priceUSD?"0.00":"80000"}/>
                </div>
                {form.priceUSD&&form.price&&<div style={{...s,fontSize:11,color:"#1f2937",fontWeight:700,marginTop:4}}>= {ars(parseFloat(form.price)*ARS_TO_USD)}</div>}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div><label style={lbl}>Costo (USD)</label><input style={inp} type="number" value={form.costo} onChange={e=>setForm(p=>({...p,costo:e.target.value}))} placeholder="0.00"/></div>
                <div><label style={lbl}>Peso (kg)</label><input style={inp} type="number" value={form.peso} onChange={e=>setForm(p=>({...p,peso:e.target.value}))} placeholder="0.5"/></div>
              </div>
              <div style={{marginBottom:20}}>
                <label style={lbl}>Link de la foto</label>
                <div style={{position:"relative"}}>
                  <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#374151",pointerEvents:"none"}}><Icon name="link" size={13}/></div>
                  <input style={{...inp,paddingLeft:32}} value={form.photoUrl} onChange={e=>setForm(p=>({...p,photoUrl:e.target.value}))} placeholder="https://gyazo.com/..."/>
                </div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <Btn variant="ghost" onClick={()=>{setShowForm(false);resetForm();}} style={{flex:1,justifyContent:"center"}}>Cancelar</Btn>
                <Btn variant="primary" disabled={!form.name.trim()} onClick={handleSave} style={{flex:2,justifyContent:"center"}}>
                  <Icon name="check" size={14}/>{editing?"Guardar cambios":"Agregar al catálogo"}
                </Btn>
              </div>
            </Modal>
          )}
        </div>
      );
    }

    // ─── APP ROOT ────────────────────────────────────────────────────────────────
    function App() {
      // Auto-init Firebase — sin login, acceso directo
      useEffect(() => {
        const tryInit = () => {
          if (typeof firebase !== "undefined" && firebase.database) {
            try { initDb(FIREBASE_CFG); return true; } catch(e) { console.error(e); return false; }
          }
          return false;
        };
        if (!tryInit()) {
          let attempts = 0;
          const iv = setInterval(()=>{
            attempts++;
            if (tryInit() || attempts > 40) clearInterval(iv);
          }, 250);
        }
      }, []);
      const [pwHash] = useState(null);
      const [fbReady, setFbReady] = useState(true); // render immediately with safe defaults
      const [showSetup, setShowSetup] = useState(false);
      const [showPlanilla, setShowPlanilla] = useState(false);
      const [showViajes, setShowViajes] = useState(false);
      const [showCatalogo, setShowCatalogo] = useState(false);
      const [isConnected, setIsConnected] = useState(true);
      const [data, setData] = useState({ clients:[], orders:[], viajes:[], catalogo:[] });
      const [syncing, setSyncing] = useState(false);
      const [lastSaved, setLastSaved] = useState(null);
      const [selectedClient, setSelectedClient] = useState(null);
      const [showNewClient, setShowNewClient] = useState(false);
      const [showEditClient, setShowEditClient] = useState(false);
      const [showNewOrder, setShowNewOrder] = useState(false);
      const [showRemito, setShowRemito] = useState(false);
      const [toast, setToast] = useState(null);
      const skipNextSync = useRef(false);

      useEffect(() => {
        const waitForDb = (attempts = 0) => {
          if (_db) {
            const unsub = dbListen(remoteData => {
              if (skipNextSync.current) { skipNextSync.current = false; return; }
              setData({
                clients: remoteData.clients || [],
                orders: remoteData.orders || [],
                viajes: remoteData.viajes || [],
                catalogo: remoteData.catalogo || []
              });
              setFbReady(true);
            });
            setFbReady(true);
            return unsub;
          }
          if (attempts < 50) setTimeout(() => waitForDb(attempts + 1), 300);
          else setFbReady(true);
        };
        setTimeout(() => waitForDb(), 800);
      }, []);

      const update = nd => {
        setData(nd);
        if (isConnected) {
          skipNextSync.current = true;
          setSyncing(true);
          dbSave(nd);
          setTimeout(() => { setSyncing(false); setLastSaved(new Date().toLocaleTimeString("es-AR",{hour:"2-digit",minute:"2-digit"})); }, 800);
        }
      };
      const notify = (msg, type="ok") => setToast({msg, type});
      const { clients, orders } = data;

      if (!fbReady) return (
        <div style={{minHeight:"100vh",background:"#eef0f4",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
          <div style={{fontSize:40}}>✨</div>
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:16,fontWeight:700,color:"#1e293b"}}>GaDigital</div>
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:13,color:"#64748b"}}>Conectando...</div>
        </div>
      );

      const addClient = ({name,phone,note}) => { update({...data, clients:[...clients,{id:uid(),name,phone,note,createdAt:today()}]}); setShowNewClient(false); notify("✓ Clienta creada"); };
      const editClient = ({name,phone,note}) => { update({...data, clients:clients.map(c=>c.id===selectedClient.id?{...c,name,phone,note}:c)}); setSelectedClient(p=>({...p,name,phone,note})); setShowEditClient(false); notify("✓ Datos actualizados"); };
      const deleteClient = id => { update({clients:clients.filter(c=>c.id!==id), orders:orders.filter(o=>o.clientId!==id)}); if(selectedClient?.id===id) setSelectedClient(null); notify("Clienta eliminada","err"); };
      const addOrder = items => { const tp=items.reduce((a,i)=>a+i.price,0), tr=items.reduce((a,i)=>a+i.reserva,0); update({...data, orders:[...orders,{id:uid(),clientId:selectedClient.id,date:today(),status:"pendiente",items,totalPrice:tp,totalReserva:tr,totalSaldo:tp-tr}]}); setShowNewOrder(false); notify("✓ Pedido guardado"); };
      const updateOrder = (id,patch) => update({...data, orders:orders.map(o=>o.id===id?{...o,...patch}:o)});
      const deleteOrder = id => { update({...data, orders:orders.filter(o=>o.id!==id)}); notify("Pedido eliminado","err"); };

      // Viajes CRUD
      const viajes = data.viajes || [];
      const addViaje = v => { update({...data, viajes:[...viajes,{id:uid(),...v,createdAt:today()}]}); notify("✓ Viaje creado"); };
      const updateViaje = (id,patch) => update({...data, viajes:viajes.map(v=>v.id===id?{...v,...patch}:v)});
      const deleteViaje = id => { update({...data, viajes:viajes.filter(v=>v.id!==id)}); notify("Viaje eliminado","err"); };

      // Catálogo CRUD
      const catalogo = data.catalogo || [];
      const addCatalogItem = item => { update({...data, catalogo:[...catalogo,{id:uid(),...item}]}); notify("✓ Producto agregado al catálogo"); };
      const updateCatalogItem = (id,patch) => update({...data, catalogo:catalogo.map(p=>p.id===id?{...p,...patch}:p)});
      const deleteCatalogItem = id => { update({...data, catalogo:catalogo.filter(p=>p.id!==id)}); notify("Producto eliminado","err"); };

      useEffect(() => { if(selectedClient){ const r=clients.find(c=>c.id===selectedClient.id); if(r) setSelectedClient(r); } }, [data]);


      const navTo = view => { setShowPlanilla(view==="planilla"); setShowViajes(view==="viajes"); setShowCatalogo(view==="catalogo"); setSelectedClient(null); };

      return (
        <div style={{minHeight:"100vh", background:"#eef0f4", color:"#0f172a"}}>
          <header style={{background:"#f5f6f9", borderBottom:"1px solid #e2e8f0", padding:"16px 24px", display:"flex", alignItems:"center", justifyContent:"space-between", position:"sticky", top:0, zIndex:100, backdropFilter:"blur(12px)"}}>
            <div style={{display:"flex", alignItems:"center", gap:12, cursor:(selectedClient||showPlanilla||showViajes)?"pointer":"default"}} onClick={()=>navTo("clientes")}>
              <div style={{width:36, height:36, borderRadius:10, background:"linear-gradient(135deg,#a855f7,#7c3aed)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:18}}>✨</div>
              <div>
                <div style={{fontFamily:"'Sora',sans-serif", fontSize:16, fontWeight:800, color:"#0f172a", lineHeight:1}}>GaDigital</div>
                <div style={{fontFamily:"'Sora',sans-serif", fontSize:10, color:"#374151", letterSpacing:1, textTransform:"uppercase"}}>Panel de gestión</div>
              </div>
            </div>
            <div style={{display:"flex", alignItems:"center", gap:8}}>
              {!selectedClient && (<>
                <button onClick={()=>navTo(showPlanilla?"clientes":"planilla")} style={{
                  background:showPlanilla?"rgba(167,139,250,0.2)":"rgba(255,255,255,0.05)",
                  border:showPlanilla?"1px solid rgba(167,139,250,0.4)":"1px solid rgba(255,255,255,0.08)",
                  borderRadius:8, padding:"6px 12px", cursor:"pointer",
                  color:showPlanilla?"#a78bfa":"#94a3b8",
                  fontFamily:"'Sora',sans-serif", fontSize:11, fontWeight:600,
                  display:"flex", alignItems:"center", gap:5
                }}>📊 {showPlanilla?"Ver clientas":"Ver planilla"}</button>
                <button onClick={()=>navTo(showViajes?"clientes":"viajes")} style={{
                  background:showViajes?"rgba(251,191,36,0.2)":"rgba(255,255,255,0.05)",
                  border:showViajes?"1px solid rgba(251,191,36,0.4)":"1px solid rgba(255,255,255,0.08)",
                  borderRadius:8, padding:"6px 12px", cursor:"pointer",
                  color:showViajes?"#fbbf24":"#94a3b8",
                  fontFamily:"'Sora',sans-serif", fontSize:11, fontWeight:600,
                  display:"flex", alignItems:"center", gap:5
                }}>✈️ {showViajes?"Ver clientas":"Cierres / Viajes"}</button>
                <button onClick={()=>navTo(showCatalogo?"clientes":"catalogo")} style={{
                  background:showCatalogo?"rgba(96,165,250,0.2)":"rgba(255,255,255,0.05)",
                  border:showCatalogo?"1px solid rgba(96,165,250,0.4)":"1px solid rgba(255,255,255,0.08)",
                  borderRadius:8, padding:"6px 12px", cursor:"pointer",
                  color:showCatalogo?"#60a5fa":"#94a3b8",
                  fontFamily:"'Sora',sans-serif", fontSize:11, fontWeight:600,
                  display:"flex", alignItems:"center", gap:5
                }}>🛍️ {showCatalogo?"Ver clientas":"Catálogo"}</button>
              </>)}
              <div style={{fontFamily:"'Sora',sans-serif",fontSize:11,color:"#4ade80",display:"flex",alignItems:"center",gap:5,padding:"6px 11px",background:"rgba(34,197,94,0.08)",border:"1px solid rgba(34,197,94,0.2)",borderRadius:8}}>
                <div style={{width:6,height:6,borderRadius:"50%",background:syncing?"#f59e0b":"#4ade80"}}/>
                {syncing?"Guardando...":"GaDigital ✓"}
              </div>
              {isConnected&&<button onClick={()=>{clearAuthed();setScreen("login");}} style={{background:"#e8eaf0",border:"1px solid #d4d8e2",borderRadius:8,padding:"6px 10px",cursor:"pointer",color:"#374151",fontFamily:"'Sora',sans-serif",fontSize:11}}>🔒 Salir</button>}
              {selectedClient&&<button onClick={()=>setShowEditClient(true)} style={{background:"#e8eaf0",border:"1px solid #d4d8e2",borderRadius:8,padding:"6px 12px",cursor:"pointer",color:"#374151",display:"flex",alignItems:"center",gap:5,fontFamily:"'Sora',sans-serif",fontSize:12}}><Icon name="edit" size={13}/>Editar clienta</button>}
            </div>
          </header>

          <main style={{maxWidth:showPlanilla?"100%":showViajes?"100%":showCatalogo?"100%":900, margin:"0 auto", padding:showPlanilla||showViajes||showCatalogo?"20px 32px":"28px 20px"}}>
            {showPlanilla
              ? <PlanillaView clients={clients} orders={orders} onUpdateOrder={updateOrder}/>
              : showViajes
                ? <ViajesView clients={clients} orders={orders} viajes={viajes} onAddViaje={addViaje} onUpdateViaje={updateViaje} onDeleteViaje={deleteViaje} onUpdateOrder={updateOrder}/>
                : showCatalogo
                  ? <CatalogoView catalogo={catalogo} onAdd={addCatalogItem} onUpdate={updateCatalogItem} onDelete={deleteCatalogItem}/>
                  : !selectedClient
                    ? <ClientsList clients={clients} orders={orders} onSelect={setSelectedClient} onNewClient={()=>setShowNewClient(true)} onDeleteClient={deleteClient}/>
                    : <ClientDetail client={selectedClient} orders={orders} catalogo={catalogo} onBack={()=>setSelectedClient(null)} onAddOrder={()=>setShowNewOrder(true)} onUpdateOrder={updateOrder} onDeleteOrder={deleteOrder} onPrint={()=>setShowRemito(true)}/>
            }
          </main>

          {showNewClient&&<NewClientModal onSave={addClient} onClose={()=>setShowNewClient(false)}/>}
          {showEditClient&&selectedClient&&<NewClientModal existing={selectedClient} onSave={editClient} onClose={()=>setShowEditClient(false)}/>}
          {showNewOrder&&selectedClient&&<NewOrderModal clientName={selectedClient.name} onSave={addOrder} onClose={()=>setShowNewOrder(false)} catalogo={catalogo}/>}
          {showRemito&&selectedClient&&<RemitoModal client={selectedClient} orders={orders} onClose={()=>setShowRemito(false)}/>}
          {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
