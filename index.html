<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GaDigital — Panel de Gestión</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #eef0f4; color: #0f172a; font-family: 'Sora', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    @media print {
      body * { visibility: hidden !important; }
      #remito-print, #remito-print * { visibility: visible !important; }
      #remito-print {
        position: fixed !important; inset: 0 !important;
        background: white !important; padding: 32px 40px !important;
        font-family: 'Segoe UI', Arial, sans-serif !important;
        color: #111 !important; z-index: 99999 !important;
        overflow: auto !important;
      }
    }
  </style>
</head>
<body>
  <div id="root">
    <div id="initial-loader" style="min-height:100vh;background:#eef0f4;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;font-family:sans-serif;">
      <div style="font-size:40px">✨</div>
      <div style="font-size:18px;font-weight:700;color:#1e293b">GaDigital</div>
      <div style="font-size:13px;color:#64748b">Cargando...</div>
    </div>
  </div>
  <script>
    // Remove loader when React takes over
    window.addEventListener('load', () => {
      setTimeout(() => {
        const loader = document.getElementById('initial-loader');
        if (loader) loader.style.display = 'none';
      }, 100);
    });
  </script>

  <!-- Firebase SDK compat (works with Babel standalone) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <script>
    // Pre-initialize Firebase before React loads
    window._fbConfig = {
      apiKey: "AIzaSyAYqEGv6dQPAQVdHYJh2ug3HLqL1TDOClc",
      authDomain: "gadigital-a51cc.firebaseapp.com",
      databaseURL: "https://gadigital-a51cc-default-rtdb.firebaseio.com",
      projectId: "gadigital-a51cc",
      storageBucket: "gadigital-a51cc.firebasestorage.app",
      messagingSenderId: "326069780447",
      appId: "1:326069780447:web:044c60a18122090113ce6a"
    };
    try {
      if (!firebase.apps.length) firebase.initializeApp(window._fbConfig);
      window._db = firebase.database();
      console.log("Firebase pre-initialized ✓");
    } catch(e) { console.error("Firebase pre-init failed:", e); }
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>

  <script type="text/babel" data-presets="react" data-plugins="">
    const { useState, useEffect, useRef, useCallback } = React;

    // ─── HELPERS ────────────────────────────────────────────────────────────────
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
    const ars = n => new Intl.NumberFormat("es-AR", { style:"currency", currency:"ARS", maximumFractionDigits:0 }).format(n||0);
    const today = () => new Date().toLocaleDateString("es-AR");

    // ─── FIREBASE CONFIG (hardcodeado) ──────────────────────────────────────────
    const FIREBASE_CFG = {
      apiKey: "AIzaSyAYqEGv6dQPAQVdHYJh2ug3HLqL1TDOClc",
      authDomain: "gadigital-a51cc.firebaseapp.com",
      databaseURL: "https://gadigital-a51cc-default-rtdb.firebaseio.com",
      projectId: "gadigital-a51cc",
      storageBucket: "gadigital-a51cc.firebasestorage.app",
      messagingSenderId: "326069780447",
      appId: "1:326069780447:web:044c60a18122090113ce6a"
    };
    const AUTH_KEY = "gadigital_authed_v2";
    const PW_KEY   = "gadigital_pwhash_v2";
    const loadCfg = () => FIREBASE_CFG;
    const saveCfg = () => {};
    const loadAuthed = () => { try { return localStorage.getItem(AUTH_KEY) === "1"; } catch { return false; } };
    const saveAuthed = () => { try { localStorage.setItem(AUTH_KEY, "1"); } catch {} };
    const clearAuthed = () => { try { localStorage.removeItem(AUTH_KEY); localStorage.removeItem(PW_KEY); } catch {} };
    const loadPwHash = () => { try { return localStorage.getItem(PW_KEY)||null; } catch { return null; } };
    const savePwHash = h => { try { localStorage.setItem(PW_KEY, h); } catch {} };

    // Simple hash function for password comparison
    const hashPassword = async (password) => {
      const encoder = new TextEncoder();
      const data = encoder.encode(password + "usaimports_salt_2024");
      const hashBuffer = await crypto.subtle.digest("SHA-256", data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, "0")).join("");
    };

    // ─── FIREBASE DB HELPERS ─────────────────────────────────────────────────────
    let _db = window._db || null; // use pre-initialized if available
    const initDb = cfg => {
      try {
        if (window._db) { _db = window._db; return _db; }
        const app = firebase.apps.length ? firebase.app() : firebase.initializeApp(cfg);
        _db = firebase.database(app);
        window._db = _db;
        return _db;
      } catch(e) { console.error("Firebase init error:", e); return null; }
    };
    const dbSave = (data) => {
      if (!_db) return;
      _db.ref("gadigital/appdata").set(data);
    };
    const dbListen = (cb) => {
      if (!_db) return () => {};
      const ref = _db.ref("gadigital/appdata");
      ref.on("value", snap => {
        const val = snap.val();
        cb(val && val.clients ? val : { clients:[], orders:[], viajes:[], catalogo:[] });
      });
      return () => ref.off("value");
    };

    // ─── SETUP PASSWORD SCREEN ────────────────────────────────────────────────────
    function SetupPasswordScreen({ onDone }) {
      const [password, setPassword] = useState("");
      const [password2, setPassword2] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const trySetup = async () => {
        if (!password) { setError("Elegí una contraseña"); return; }
        if (password.length < 4) { setError("Mínimo 4 caracteres"); return; }
        if (password !== password2) { setError("Las contraseñas no coinciden"); return; }
        setLoading(true);
        const hash = await hashPassword(password);
        onDone(hash);
      };

      const i2 = { width:"100%", background:"#e8eaf0", border:"1.5px solid rgba(255,255,255,0.1)", borderRadius:12, padding:"13px 16px", color:"#0f172a", fontFamily:"'Sora',sans-serif", fontSize:14, outline:"none", boxSizing:"border-box", marginBottom:12, textAlign:"center", letterSpacing:3 };
      return (
        <div>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)} placeholder="Contraseña" style={i2} autoFocus/>
          <input type="password" value={password2} onChange={e=>setPassword2(e.target.value)} placeholder="Repetir contraseña" style={i2} onKeyDown={e=>e.key==="Enter"&&trySetup()}/>
          {error && <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,color:"#f87171",marginBottom:12}}>{error}</div>}
          <div style={{fontFamily:"'Sora',sans-serif",fontSize:12,color:"#374151",marginBottom:16}}>
            Esta contraseña la van a usar vos y tu socia para entrar desde cualquier dispositivo.
          </div>
          <button onClick={trySetup} disabled={loading} style={{width:"100%",padding:"13px",background:"linear-gradient(135deg,#a855f7,#7c3aed)",border:"none",borderRadius:12,fontFamily:"'Sora',sans-serif",fontSize:14,fontWeight:700,color:"#fff",cursor:"pointer",opacity:loading?0.6:1}}>
            {loading?"Configurando...":"✓ Crear contraseña y entrar"}
          </button>
        </div>
      );
    }

    // ─── LOGIN SCREEN ─────────────────────────────────────────────────────────────
    function LoginScreen({ onLogin }) {
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const tryLogin = async () => {
        if (!password) { setError("Ingresá la contraseña"); return; }
        setLoading(true); setError("");
        const storedHash = loadPwHash();
        const hash = await hashPassword(password);
        if (hash === storedHash) {
          saveAuthed();
          onLogin(hash);
        } else {
          setError("Contraseña incorrecta");
          setLoading(false);
        }
      };

      const s = { fontFamily:"'Sora',sans-serif" };
      return (
        <div style={{minHeight:"100vh", background:"#eef0f4", display:"flex", alignItems:"center", justifyContent:"center", padding:20}}>
          <div style={{width:"100%", maxWidth:380, textAlign:"center"}}>
            <div style={{fontSize:44, marginBottom:16}}>🔐</div>
            <div style={{...s, fontSize:22, fontWeight:800, color:"#0f172a", marginBottom:6}}>USA Imports</div>
            <div style={{...s, fontSize:13, color:"#374151", marginBottom:32}}>Ingresá tu contraseña para continuar</div>
            <input
              type="password" value={password}
              onChange={e=>setPassword(e.target.value)}
              onKeyDown={e=>e.key==="Enter"&&tryLogin()}
              placeholder="Contraseña"
              autoFocus
              style={{width:"100%", background:"#e8eaf0", border:"1.5px solid rgba(255,255,255,0.1)", borderRadius:12, padding:"13px 16px", color:"#0f172a", fontFamily:"'Sora',sans-serif", fontSize:14, outline:"none", boxSizing:"border-box", marginBottom:12, textAlign:"center", letterSpacing:4}}
            />
            {error && <div style={{...s, fontSize:12, color:"#f87171", marginBottom:12}}>{error}</div>}
            <button onClick={tryLogin} disabled={loading} style={{width:"100%", padding:"13px", background:"linear-gradient(135deg,#3b82f6,#2563eb)", border:"none", borderRadius:12, ...s, fontSize:14, fontWeight:700, color:"#fff", cursor:"pointer", opacity:loading?0.6:1}}>
              {loading ? "Verificando..." : "Entrar →"}
            </button>
          </div>
        </div>
      );
    }

    // ─── SETUP SCREEN ────────────────────────────────────────────────────────────
    function SetupScreen({ onConnect, asModal=false, onClose }) {
      const [cfg, setCfg] = useState({
        apiKey:"", authDomain:"", databaseURL:"", projectId:"", storageBucket:"", messagingSenderId:"", appId:""
      });
      const [password, setPassword] = useState("");
      const [password2, setPassword2] = useState("");
      const [error, setError] = useState("");
      const [loading, setLoading] = useState(false);

      const fields = [
        ["apiKey","API Key"],["authDomain","Auth Domain"],["databaseURL","Database URL ⚠️"],
        ["projectId","Project ID"],["storageBucket","Storage Bucket"],
        ["messagingSenderId","Messaging Sender ID"],["appId","App ID"]
      ];

      const tryConnect = async () => {
        if (!cfg.apiKey || !cfg.databaseURL || !cfg.projectId) { setError("Completá al menos: API Key, Database URL y Project ID"); return; }
        if (!password) { setError("Elegí una contraseña para proteger tu app"); return; }
        if (password !== password2) { setError("Las contraseñas no coinciden"); return; }
        if (password.length < 4) { setError("La contraseña debe tener al menos 4 caracteres"); return; }
        setLoading(true); setError("");
        try {
          // Wait for Firebase modules to be available
          await new Promise((resolve, reject) => {
            let attempts = 0;
            const check = () => {
              if (window._firebaseModules?.initializeApp) { resolve(); return; }
              if (attempts++ > 40) { reject(new Error("Firebase no cargó. Revisá tu conexión a internet.")); return; }
              setTimeout(check, 200);
            };
            check();
          });
          const pwHash = await hashPassword(password);
          initDb(cfg);
          saveCfg({...cfg, pwHash});
          saveAuthed();
          onConnect(pwHash);
        } catch(e) { setError("Error al conectar: " + e.message); setLoading(false); }
      };

      const pasteJson = (text) => {
        try {
          const cleaned = text.replace(/.*?({[\s\S]*})/m, '$1');
          const parsed = JSON.parse(cleaned);
          const mapped = {
            apiKey: parsed.apiKey||"", authDomain: parsed.authDomain||"",
            databaseURL: parsed.databaseURL||"", projectId: parsed.projectId||"",
            storageBucket: parsed.storageBucket||"", messagingSenderId: parsed.messagingSenderId||"",
            appId: parsed.appId||""
          };
          setCfg(mapped);
        } catch { /* not JSON, ignore */ }
      };

      const s = { fontFamily:"'Sora',sans-serif" };
      const inp2 = { width:"100%", background:"#e8eaf0", border:"1.5px solid rgba(255,255,255,0.1)", borderRadius:10, padding:"10px 13px", color:"#0f172a", fontFamily:"'Sora',sans-serif", fontSize:12, outline:"none", boxSizing:"border-box" };

      const inner = (
        <div style={{width:"100%", maxWidth:520}}>
          <div style={{textAlign:"center", marginBottom:32}}>
            <div style={{fontSize:40, marginBottom:12}}>🔥</div>
            <div style={{...s, fontSize:24, fontWeight:800, color:"#0f172a", marginBottom:6}}>Conectar a Firebase</div>
            <div style={{...s, fontSize:13, color:"#374151", lineHeight:1.6}}>
              Para sincronizar datos entre dispositivos necesitás conectar tu base de datos de Firebase.
            </div>
          </div>

            {/* Steps */}
            <div style={{background:"rgba(59,130,246,0.08)", border:"1px solid rgba(59,130,246,0.2)", borderRadius:14, padding:20, marginBottom:24}}>
              <div style={{...s, fontSize:12, fontWeight:700, color:"#60a5fa", marginBottom:12, textTransform:"uppercase", letterSpacing:0.8}}>📋 Pasos para obtener tu configuración</div>
              {[
                ["1","Entrá a", "console.firebase.google.com", "https://console.firebase.google.com"],
                ["2","Creá un proyecto nuevo (o usá uno existente)","",""],
                ["3","En el proyecto → Realtime Database → Crear base de datos → elegí cualquier región → Modo de prueba","",""],
                ["4","Volvé al inicio del proyecto → ícono </> (Web) → Registrar app → copiá el objeto firebaseConfig","",""],
              ].map(([n, text, link, href])=>(
                <div key={n} style={{display:"flex", gap:10, marginBottom:10, alignItems:"flex-start"}}>
                  <div style={{width:22, height:22, borderRadius:"50%", background:"rgba(59,130,246,0.25)", color:"#60a5fa", display:"flex", alignItems:"center", justifyContent:"center", ...s, fontSize:11, fontWeight:800, flexShrink:0, marginTop:1}}>{n}</div>
                  <div style={{...s, fontSize:12, color:"#374151", lineHeight:1.5}}>
                    {text} {link && <a href={href} target="_blank" style={{color:"#60a5fa"}}>{link}</a>}
                  </div>
                </div>
              ))}
            </div>

            {/* Paste area */}
            <div style={{marginBottom:16}}>
              <label style={{...s, fontSize:11, color:"#374151", letterSpacing:0.8, textTransform:"uppercase", marginBottom:6, display:"block", fontWeight:600}}>
                Pegá el objeto firebaseConfig completo aquí (o completá campo por campo abajo)
              </label>
              <textarea
                rows={4}
                placeholder={'{\n  apiKey: "AIza...",\n  databaseURL: "https://tu-proyecto-default-rtdb.firebaseio.com",\n  projectId: "tu-proyecto",\n  ...\n}'}
                onChange={e => pasteJson(e.target.value)}
                style={{...inp2, resize:"vertical", fontSize:11, fontFamily:"monospace", color:"#a5f3fc"}}
              />
            </div>

            {/* Individual fields */}
            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:20}}>
              {fields.map(([key, label])=>(
                <div key={key} style={key==="databaseURL"?{gridColumn:"1/-1"}:{}}>
                  <label style={{...s, fontSize:10, color:"#374151", letterSpacing:0.8, textTransform:"uppercase", marginBottom:4, display:"block", fontWeight:600}}>{label}</label>
                  <input style={{...inp2, borderColor: key==="databaseURL"?"rgba(251,191,36,0.4)":"rgba(255,255,255,0.1)"}}
                    value={cfg[key]} onChange={e=>setCfg(p=>({...p,[key]:e.target.value}))}
                    placeholder={key==="databaseURL"?"https://mi-proyecto-default-rtdb.firebaseio.com":""}
                  />
                </div>
              ))}
            </div>

            {error && <div style={{...s, fontSize:12, color:"#f87171", background:"rgba(248,113,113,0.1)", border:"1px solid rgba(248,113,113,0.2)", borderRadius:10, padding:"10px 14px", marginBottom:16}}>{error}</div>}

            {/* Password section */}
            <div style={{background:"rgba(34,197,94,0.06)", border:"1px solid rgba(34,197,94,0.2)", borderRadius:14, padding:16, marginBottom:16}}>
              <div style={{...s, fontSize:12, fontWeight:700, color:"#4ade80", marginBottom:12, textTransform:"uppercase", letterSpacing:0.8}}>🔒 Elegí una contraseña para tu app</div>
              <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10}}>
                <div>
                  <label style={{...s, fontSize:10, color:"#374151", letterSpacing:0.8, textTransform:"uppercase", marginBottom:4, display:"block", fontWeight:600}}>Contraseña</label>
                  <input type="password" style={inp2} value={password} onChange={e=>setPassword(e.target.value)} placeholder="Mínimo 4 caracteres"/>
                </div>
                <div>
                  <label style={{...s, fontSize:10, color:"#374151", letterSpacing:0.8, textTransform:"uppercase", marginBottom:4, display:"block", fontWeight:600}}>Repetir contraseña</label>
                  <input type="password" style={inp2} value={password2} onChange={e=>setPassword2(e.target.value)} placeholder="Repetir"/>
                </div>
              </div>
              <div style={{...s, fontSize:11, color:"#374151", marginTop:8}}>
                Esta contraseña la van a necesitar vos y tu socia cada vez que abran la app en un dispositivo nuevo.
              </div>
            </div>

            <button onClick={tryConnect} disabled={loading} style={{width:"100%", padding:"14px", background:"linear-gradient(135deg,#f59e0b,#d97706)", border:"none", borderRadius:12, ...s, fontSize:14, fontWeight:800, color:"#1c1917", cursor:"pointer", opacity:loading?0.6:1}}>
              {loading ? "Conectando..." : "🔗 Conectar y guardar configuración"}
            </button>

            <div style={{...s, fontSize:11, color:"#374151", textAlign:"center", marginTop:12, lineHeight:1.5}}>
              La configuración se guarda en este navegador. La próxima vez que abras el archivo, se conectará automáticamente.
            </div>
          </div>
        );

      if (asModal) return (
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.8)",backdropFilter:"blur(4px)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:20,overflowY:"auto"}} onClick={e=>e.target===e.currentTarget&&onClose()}>
          <div style={{background:"#f5f6f9",border:"1px solid #d4d8e2",borderRadius:22,padding:28,width:"100%",maxWidth:540,maxHeight:"90vh",overflowY:"auto",boxShadow:"0 24px 60px rgba(0,0,0,0.7)",position:"relative"}}>
            <button onClick={onClose} style={{position:"absolute",top:16,right:16,background:"rgba(255,255,255,0.07)",border:"none",borderRadius:8,width:32,height:32,cursor:"pointer",color:"#374151",display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>✕</button>
            {inner}
          </div>
        </div>
      );

      return (
        <div style={{minHeight:"100vh", background:"#eef0f4", display:"flex", alignItems:"center", justifyContent:"center", padding:20}}>
          {inner}
        </div>
      );
    }

    // ─── ICONS ──────────────────────────────────────────────────────────────────
    const Icon = ({ name, size=16 }) => {
      const icons = {
        plus:   <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
        trash:  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="3,6 5,6 21,6"/><path d="M19,6l-1,14H6L5,6"/><path d="M10,11v6M14,11v6"/></svg>,
        edit:   <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11,4H4a2,2,0,0,0-2,2v14a2,2,0,0,0,2,2H18a2,2,0,0,0,2-2v-7"/><path d="M18.5,2.5a2.121,2.121,0,0,1,3,3L12,15l-4,1,1-4Z"/></svg>,
        check:  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20,6 9,17 4,12"/></svg>,
        x:      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
        user:   <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M20,21v-2a4,4,0,0,0-4-4H8a4,4,0,0,0-4,4v2"/><circle cx="12" cy="7" r="4"/></svg>,
        bag:    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M6,2L3,6v14a2,2,0,0,0,2,2H19a2,2,0,0,0,2-2V6L18,2Z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16,10a4,4,0,0,1-8,0"/></svg>,
        back:   <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="15,18 9,12 15,6"/></svg>,
        search: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
        dollar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17,5H9.5a3.5,3.5,0,0,0,0,7h5a3.5,3.5,0,0,1,0,7H6"/></svg>,
        print:  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2V11a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg>,
        image:  <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>,
        link:   <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10,13a5,5,0,0,0,7.54.54l3-3a5,5,0,0,0-7.07-7.07l-1.72,1.71"/><path d="M14,11a5,5,0,0,0-7.54-.54l-3,3a5,5,0,0,0,7.07,7.07l1.71-1.71"/></svg>,
      };
      return icons[name] || null;
    };

    // ─── SHARED STYLES ───────────────────────────────────────────────────────────
    const inp = { width:"100%", background:"#e8eaf0", border:"1.5px solid rgba(255,255,255,0.1)", borderRadius:10, padding:"11px 13px", color:"#0f172a", fontFamily:"'Sora',sans-serif", fontSize:13, outline:"none", boxSizing:"border-box" };
    const lbl = { fontFamily:"'Sora',sans-serif", fontSize:11, color:"#374151", letterSpacing:0.9, textTransform:"uppercase", marginBottom:5, display:"block", fontWeight:600 };

    const Btn = ({ onClick, children, variant="primary", small=false, disabled=false, style:sx={} }) => {
      const v = {
        primary:{ background:"linear-gradient(135deg,#3b82f6,#2563eb)", color:"#fff", border:"none" },
        ghost:  { background:"#e8eaf0", color:"#374151", border:"1px solid #d4d8e2" },
        danger: { background:"rgba(239,68,68,0.12)", color:"#f87171", border:"1px solid rgba(239,68,68,0.2)" },
        success:{ background:"rgba(34,197,94,0.15)", color:"#4ade80", border:"1px solid rgba(34,197,94,0.25)" },
        amber:  { background:"linear-gradient(135deg,#f59e0b,#d97706)", color:"#1c1917", border:"none" },
        teal:   { background:"linear-gradient(135deg,#0d9488,#0f766e)", color:"#fff", border:"none" },
      };
      return <button onClick={onClick} disabled={disabled} style={{...v[variant], borderRadius:10, padding:small?"7px 14px":"11px 20px", fontFamily:"'Sora',sans-serif", fontSize:small?12:13, fontWeight:700, cursor:disabled?"default":"pointer", opacity:disabled?0.4:1, display:"inline-flex", alignItems:"center", gap:6, transition:"opacity .15s", ...sx}}>{children}</button>;
    };

    const StatCard = ({ label, value, color="#3b82f6", icon }) => (
      <div style={{background:"#f5f6f9", borderRadius:12, padding:"12px 14px", border:`1px solid ${color}22`}}>
        <div style={{display:"flex", alignItems:"center", gap:6, marginBottom:5}}>
          <div style={{width:22, height:22, borderRadius:6, background:`${color}22`, display:"flex", alignItems:"center", justifyContent:"center", color}}>{icon}</div>
          <span style={{fontFamily:"'Sora',sans-serif", fontSize:9, color:"#374151", letterSpacing:1, textTransform:"uppercase", fontWeight:600}}>{label}</span>
        </div>
        <div style={{fontFamily:"'Sora',sans-serif", fontSize:16, color, fontWeight:800, lineHeight:1.2}}>{value}</div>
      </div>
    );

    // ─── TOAST ───────────────────────────────────────────────────────────────────
    function Toast({ msg, type="ok", onClose }) {
      useEffect(() => { const t = setTimeout(onClose, 2800); return () => clearTimeout(t); }, []);
      return (
        <div style={{position:"fixed", bottom:24, left:"50%", transform:"translateX(-50%)", background:type==="ok"?"#166534":"#7f1d1d", border:`1px solid ${type==="ok"?"#16a34a":"#dc2626"}`, color:"#fff", padding:"11px 22px", borderRadius:40, fontFamily:"'Sora',sans-serif", fontSize:13, fontWeight:600, boxShadow:"0 8px 28px rgba(0,0,0,0.5)", zIndex:9999, whiteSpace:"nowrap"}}>
          {msg}
        </div>
      );
    }

    // ─── MODAL ───────────────────────────────────────────────────────────────────
    function Modal({ title, onClose, children, wide=false }) {
      return (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", backdropFilter:"blur(4px)", zIndex:500, display:"flex", alignItems:"center", justifyContent:"center", padding:20}} onClick={e => e.target===e.currentTarget && onClose()}>
          <div style={{background:"#f5f6f9", border:"1px solid #d4d8e2", borderRadius:22, padding:28, width:"100%", maxWidth:wide?580:460, maxHeight:"88vh", overflowY:"auto", boxShadow:"0 24px 60px rgba(0,0,0,0.6)"}}>
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:22}}>
              <h3 style={{fontFamily:"'Sora',sans-serif", fontSize:18, color:"#0f172a", margin:0, fontWeight:700}}>{title}</h3>
              <button onClick={onClose} style={{background:"rgba(255,255,255,0.07)", border:"none", borderRadius:8, width:32, height:32, cursor:"pointer", color:"#374151", display:"flex", alignItems:"center", justifyContent:"center"}}><Icon name="x" size={15}/></button>
            </div>
            {children}
          </div>
        </div>
      );
    }

    // ─── REMITO MODAL ────────────────────────────────────────────────────────────
    function RemitoModal({ client, orders, onClose }) {
      const [soloLlegados, setSoloLlegados] = useState(false);
      const fmt    = n => new Intl.NumberFormat("es-AR",{style:"currency",currency:"ARS",maximumFractionDigits:0}).format(n||0);
      const fmtUSD = n => `U$D ${parseFloat(n||0).toLocaleString("es-AR",{minimumFractionDigits:0,maximumFractionDigits:0})}`;
      const clientOrders = orders.filter(o => o.clientId === client.id && o.status !== "cancelado");
      const allItems = clientOrders.flatMap(o => o.items.map(i=>({...i, date:o.date, status:o.status})));
      const filteredItems = soloLlegados ? allItems.filter(i => i.llegado || i.mostrarRemito) : allItems;

      // Separate ARS and USD items
      const itemsARS = filteredItems.filter(i => i.priceUSD == null);
      const itemsUSD = filteredItems.filter(i => i.priceUSD != null);
      const hasARS   = itemsARS.length > 0;
      const hasUSD   = itemsUSD.length > 0;
      const hasMixed = hasARS && hasUSD;

      // ARS totals (items priced in ARS)
      const totalPedidoARS  = itemsARS.reduce((a,i)=>a+i.price,0);
      const totalReservaARS = itemsARS.reduce((a,i)=>a+i.reserva,0);
      const totalSaldoARS   = itemsARS.reduce((a,i)=>a+(i.pagado?0:i.price-i.reserva),0);

      // USD totals (items priced in USD)
      const totalPedidoUSD  = itemsUSD.reduce((a,i)=>a+(i.priceUSD||0),0);
      const totalReservaUSD = itemsUSD.reduce((a,i)=>a+(i.reservaUSD!=null?i.reservaUSD:i.reserva/ARS_TO_USD),0);
      const totalSaldoUSD   = itemsUSD.reduce((a,i)=>a+(i.pagado?0:(i.priceUSD||0)-(i.reservaUSD!=null?i.reservaUSD:i.reserva/ARS_TO_USD)),0);

      // Legacy totals for single-currency (all ARS)
      const totalPedido  = filteredItems.reduce((a,i)=>a+i.price,0);
      const totalReserva = filteredItems.reduce((a,i)=>a+i.reserva,0);
      const totalSaldo   = filteredItems.reduce((a,i)=>a+(i.pagado?0:i.price-i.reserva),0);

      return (
        <div style={{position:"fixed", inset:0, background:"rgba(0,0,0,0.8)", backdropFilter:"blur(6px)", zIndex:600, display:"flex", alignItems:"flex-start", justifyContent:"center", padding:"20px", overflowY:"auto"}}>
          <div id="remito-print" style={{background:"#fff", borderRadius:16, padding:"32px 36px", width:"100%", maxWidth:720, color:"#111", fontFamily:"'Segoe UI',Arial,sans-serif", fontSize:13, boxShadow:"0 32px 80px rgba(0,0,0,0.5)"}}>

            <div style={{display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:24, paddingBottom:16, borderBottom:"2px solid #1d4ed8"}}>
              <div>
                <div style={{fontSize:24, fontWeight:800, color:"#1d4ed8", letterSpacing:"-0.5px"}}>Ga<span style={{color:"#a855f7"}}>Digital</span></div>
                <div style={{fontSize:11, color:"#6b7280", letterSpacing:1, textTransform:"uppercase", marginTop:3}}>Remito de compra</div>
              </div>
              <div style={{textAlign:"right", fontSize:12, color:"#6b7280"}}>
                <div style={{fontWeight:700, color:"#111", marginBottom:2}}>Fecha: {today()}</div>
                <div>Pedidos: {clientOrders.length} · Productos: {allItems.length}</div>
              </div>
            </div>

            <div style={{background:"#eef0f4", border:"1px solid #d4d8e2", borderRadius:8, padding:"14px 18px", marginBottom:16}}>
              <div style={{fontSize:18, fontWeight:800, color:"#111", marginBottom:4}}>{client.name}</div>
              <div style={{fontSize:12, color:"#6b7280"}}>
                {[client.phone?"📱 "+client.phone:"", client.note||""].filter(Boolean).join("  ·  ")}
              </div>
            </div>

            {/* Filter toggle */}
            <div style={{display:"flex", gap:4, marginBottom:20, background:"#e2e8f0", borderRadius:10, padding:4}}>
              {[["📋 Todos los productos", false],["✈️ Llegaron + en remito", true]].map(([label,val])=>(
                <button key={String(val)} onClick={()=>setSoloLlegados(val)} style={{
                  flex:1, padding:"8px 10px", borderRadius:7, border:"none", cursor:"pointer",
                  background: soloLlegados===val ? "#1d4ed8" : "transparent",
                  color: soloLlegados===val ? "#fff" : "#6b7280",
                  fontFamily:"'Sora',sans-serif", fontSize:12, fontWeight:600, transition:"all .15s"
                }}>{label}</button>
              ))}
            </div>

            {filteredItems.length === 0 ? (
              <div style={{textAlign:"center", padding:"30px", color:"#9ca3af", fontSize:14}}>
                {soloLlegados ? "Ningún producto marcado como llegado o para mostrar en remito." : "Sin productos para mostrar."}
              </div>
            ) : (
              <table style={{width:"100%", borderCollapse:"collapse", marginBottom:22}}>
                <thead>
                  <tr>
                    {["Producto","Fecha","Precio","Reserva","Saldo","Estado"].map((h,i)=>(
                      <th key={h} style={{background:"#1d4ed8", color:"#fff", padding:"9px 10px", fontSize:11, textAlign:i>=2?"right":i===5?"center":"left", letterSpacing:0.5, textTransform:"uppercase"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {filteredItems.map((item,idx)=>(
                    <tr key={item.id} style={{background:idx%2===1?"#f8fafc":"#fff"}}>
                      <td style={{padding:"9px 10px", borderBottom:"1px solid #f1f5f9", fontSize:12}}>
                        <div>{item.desc}{item.llegado&&<span style={{marginLeft:6,fontSize:10,color:"#d97706",fontWeight:700}}>✈️</span>}</div>
                        {item.mostrarRemito && !item.llegado && (
                          <div style={{fontSize:10, color:"#7c3aed", fontWeight:600, marginTop:2}}>⏳ Aún no llegó a Argentina</div>
                        )}
                      </td>
                      <td style={{padding:"9px 10px", borderBottom:"1px solid #f1f5f9", fontSize:12, color:"#6b7280"}}>{item.date}</td>
                      <td style={{padding:"9px 10px", borderBottom:"1px solid #f1f5f9", fontSize:12, textAlign:"right"}}>
                        {item.priceUSD!=null ? <span>{fmtUSD(item.priceUSD)}<span style={{display:"block",fontSize:10,color:"#9ca3af"}}>{fmt(item.price)}</span></span> : fmt(item.price)}
                      </td>
                      <td style={{padding:"9px 10px", borderBottom:"1px solid #f1f5f9", fontSize:12, textAlign:"right", color:"#16a34a", fontWeight:600}}>
                        {item.reservaUSD!=null ? <span>{fmtUSD(item.reservaUSD)}<span style={{display:"block",fontSize:10,color:"#9ca3af"}}>{fmt(item.reserva)}</span></span> : fmt(item.reserva)}
                      </td>
                      <td style={{padding:"9px 10px", borderBottom:"1px solid #f1f5f9", fontSize:12, textAlign:"right", color:item.pagado?"#16a34a":"#dc2626", fontWeight:700}}>
                        {item.pagado ? "✓ PAGADO" : item.priceUSD!=null
                          ? <span>{fmtUSD((item.priceUSD||0)-(item.reservaUSD!=null?item.reservaUSD:item.reserva/ARS_TO_USD))}<span style={{display:"block",fontSize:10,color:"#9ca3af"}}>{fmt(item.price-item.reserva)}</span></span>
                          : fmt(item.price - item.reserva)}
                      </td>
                      <td style={{padding:"9px 10px", borderBottom:"1px solid #f1f5f9", fontSize:11, textAlign:"center", color:item.pagado?"#16a34a":item.llegado?"#d97706":item.mostrarRemito?"#7c3aed":"#6b7280", fontWeight:600}}>
                        {item.pagado?"Pagado":item.llegado?"Llegó":item.mostrarRemito?"Sin llegar":"Pend."}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            )}

            {/* Totals — dual currency if mixed, single otherwise */}
            <div style={{marginBottom:24}}>
              {/* USD totals */}
              {hasUSD && (
                <div style={{background:"#f0fdf4", border:"1px solid #bbf7d0", borderRadius:8, padding:"14px 18px", marginBottom:hasARS?10:0}}>
                  <div style={{fontSize:10, fontWeight:700, color:"#15803d", letterSpacing:1, textTransform:"uppercase", marginBottom:10}}>
                    💵 Totales en dólares
                  </div>
                  <div style={{display:"flex", justifyContent:"flex-end", gap:32}}>
                    {[["Total pedido", fmtUSD(totalPedidoUSD), "#1d4ed8"],
                      ["Total reservado", fmtUSD(totalReservaUSD), "#16a34a"],
                      ["Saldo a pagar", totalSaldoUSD<=0?"✓ AL DÍA":fmtUSD(totalSaldoUSD), totalSaldoUSD>0?"#dc2626":"#16a34a"]
                    ].map(([label,val,color])=>(
                      <div key={label} style={{textAlign:"right"}}>
                        <div style={{fontSize:10, textTransform:"uppercase", letterSpacing:0.8, color:"#6b7280", marginBottom:4}}>{label}</div>
                        <div style={{fontSize:17, fontWeight:800, color}}>{val}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* ARS totals */}
              {hasARS && (
                <div style={{background:"#eff6ff", border:"1px solid #bfdbfe", borderRadius:8, padding:"14px 18px"}}>
                  <div style={{fontSize:10, fontWeight:700, color:"#1d4ed8", letterSpacing:1, textTransform:"uppercase", marginBottom:10}}>
                    🇦🇷 Totales en pesos
                  </div>
                  <div style={{display:"flex", justifyContent:"flex-end", gap:32}}>
                    {[["Total pedido", fmt(totalPedidoARS), "#1d4ed8"],
                      ["Total reservado", fmt(totalReservaARS), "#16a34a"],
                      ["Saldo a pagar", totalSaldoARS<=0?"✓ AL DÍA":fmt(totalSaldoARS), totalSaldoARS>0?"#dc2626":"#16a34a"]
                    ].map(([label,val,color])=>(
                      <div key={label} style={{textAlign:"right"}}>
                        <div style={{fontSize:10, textTransform:"uppercase", letterSpacing:0.8, color:"#6b7280", marginBottom:4}}>{label}</div>
                        <div style={{fontSize:17, fontWeight:800, color}}>{val}</div>
                      </div>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div style={{borderTop:"1px solid #e2e8f0", paddingTop:14, fontSize:11, color:"#9ca3af", display:"flex", justifyContent:"space-between", marginBottom:24}}>
              <span>GaDigital · Productos importados de EE.UU.</span>
              <span>Generado: {new Date().toLocaleString("es-AR")}</span>
            </div>

            <div style={{display:"flex", gap:10, justifyContent:"flex-end"}}>
              <button onClick={onClose} style={{padding:"10px 20px", background:"#e8eaf0", border:"1px solid #d4d8e2", borderRadius:10, fontFamily:"'Sora',sans-serif", fontSize:13, fontWeight:600, color:"#6b7280", cursor:"pointer"}}>
                Cerrar
              </button>
              <button onClick={()=>window.print()} style={{padding:"10px 24px", background:"linear-gradient(135deg,#1d4ed8,#1e40af)", border:"none", borderRadius:10, fontFamily:"'Sora',sans-serif", fontSize:13, fontWeight:700, color:"#fff", cursor:"pointer", display:"flex", alignItems:"center", gap:8}}>
                🖨️ Imprimir / Guardar PDF
              </button>
            </div>
          </div>
        </div>
      );
    }

    // ─── NEW CLIENT MODAL ────────────────────────────────────────────────────────
    function NewClientModal({ onSave, onClose, existing }) {
      const [name,setName]       = useState(existing?.name||"");
      const [phone,setPhone]     = useState(existing?.phone||"");
      const [address,setAddress] = useState(existing?.address||"");
      const [note,setNote]       = useState(existing?.note||"");
      const ok = name.trim().length > 0;
      return (
        <Modal title={existing?"Editar clienta":"Nueva clienta"} onClose={onClose}>
          <div style={{marginBottom:14}}><label style={lbl}>Nombre *</label><input style={inp} value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: María García" autoFocus/></div>
          <div style={{marginBottom:14}}><label style={lbl}>WhatsApp <span style={{color:"#94a3b8",fontWeight:400,fontSize:10,textTransform:"none",letterSpacing:0}}>(con código de país, sin espacios)</span></label><input style={inp} value={phone} onChange={e=>setPhone(e.target.value)} placeholder="Ej: 5491155551234"/></div>
          <div style={{marginBottom:14}}><label style={lbl}>Dirección</label><input style={inp} value={address} onChange={e=>setAddress(e.target.value)} placeholder="Ej: Av. Corrientes 1234, CABA"/></div>
          <div style={{marginBottom:22}}><label style={lbl}>Nota interna</label><input style={inp} value={note} onChange={e=>setNote(e.target.value)} placeholder="Ej: paga siempre a tiempo"/></div>
          <div style={{display:"flex", gap:10}}>
            <Btn variant="ghost" onClick={onClose} style={{flex:1, justifyContent:"center"}}>Cancelar</Btn>
            <Btn variant="primary" disabled={!ok} onClick={()=>ok&&onSave({name:name.trim(),phone,address,note})} style={{flex:2, justifyContent:"center"}}>
              <Icon name="check" size={14}/>{existing?"Guardar cambios":"Crear clienta"}
            </Btn>
          </div>
        </Modal>
      );
    }

    // ─── NEW ORDER MODAL ─────────────────────────────────────────────────────────
    function NewOrderModal({ clientName, onSave, onClose, catalogo=[] }) {
      const [desc,setDesc] = useState("");
      const [price,setPrice] = useState("");
      const [priceUSD,setPriceUSD] = useState(false);
      const [reserva,setReserva] = useState("");
      const [reservaUSD,setReservaUSD] = useState(false);
      const [photoUrl,setPhotoUrl] = useState("");
      const [peso,setPeso] = useState("");
      const [costo,setCosto] = useState("");
      const [items,setItems] = useState([]);
      const [showCatalog,setShowCatalog] = useState(false);
      const descRef = useRef();

      const pickFromCatalog = (prod) => {
        setDesc(prod.name);
        setPriceUSD(prod.priceUSD!=null);
        setPrice(prod.priceUSD!=null ? prod.priceUSD : prod.price||"");
        setCosto(prod.costo||"");
        setPeso(prod.peso||"");
        setPhotoUrl(prod.photoUrl||"");
        setShowCatalog(false);
        setTimeout(()=>descRef.current?.focus(), 100);
      };

      const addItem = () => {
        if(!desc.trim()||!price) return;
        const priceARS   = priceUSD   ? parseFloat(price)   * ARS_TO_USD : parseFloat(price);
        const reservaVal = reserva ? (reservaUSD ? parseFloat(reserva) * ARS_TO_USD : parseFloat(reserva)) : 0;
        const reservaUSDVal = reservaUSD && reserva ? parseFloat(reserva) : null;
        setItems(p=>[...p,{
          id:uid(), desc:desc.trim(),
          price: priceARS,
          priceUSD: priceUSD ? parseFloat(price) : null,
          reserva: reservaVal,
          reservaUSD: reservaUSDVal,
          pagado:false, photoUrl:photoUrl.trim(),
          peso:peso?parseFloat(peso):null,
          costo:costo?parseFloat(costo):null
        }]);
        setDesc(""); setPrice(""); setReserva(""); setPhotoUrl(""); setPeso(""); setCosto("");
        descRef.current?.focus();
      };
      const removeItem = id => setItems(p=>p.filter(i=>i.id!==id));
      const tp = items.reduce((a,i)=>a+i.price,0);
      const tr = items.reduce((a,i)=>a+i.reserva,0);

      const CurrencyToggle = ({ isUSD, onToggle }) => (
        <div style={{display:"flex", background:"#e8eaf0", borderRadius:8, padding:2, gap:2, flexShrink:0}}>
          {[["ARS","$"],["USD","U$D"]].map(([cur,sym])=>(
            <button key={cur} onClick={()=>onToggle(cur==="USD")} style={{
              padding:"3px 10px", borderRadius:6, border:"none", cursor:"pointer",
              background:(isUSD===(cur==="USD"))?(cur==="USD"?"#16a34a":"#2563eb"):"transparent",
              color:(isUSD===(cur==="USD"))?"#fff":"#475569",
              fontFamily:"'Sora',sans-serif", fontSize:11, fontWeight:700, transition:"all .15s"
            }}>{sym} {cur}</button>
          ))}
        </div>
      );

      return (
        <Modal title={`Nuevo pedido — ${clientName}`} onClose={onClose} wide>
          <div style={{background:"#eef0f4", borderRadius:14, padding:16, marginBottom:16, border:"1px solid #d4d8e2"}}>
            {/* Catalog picker */}
            {catalogo.length>0 && (
              <div style={{marginBottom:12}}>
                <button onClick={()=>setShowCatalog(p=>!p)} style={{width:"100%",padding:"9px",background:"rgba(96,165,250,0.1)",border:"1px solid rgba(96,165,250,0.25)",borderRadius:10,fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:600,color:"#60a5fa",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
                  🛍️ {showCatalog?"Ocultar catálogo":`Elegir del catálogo (${catalogo.length} productos)`}
                </button>
                {showCatalog&&(
                  <div style={{marginTop:8,background:"rgba(0,0,0,0.3)",borderRadius:10,border:"1px solid rgba(96,165,250,0.15)",maxHeight:220,overflowY:"auto"}}>
                    {catalogo.map(prod=>(
                      <div key={prod.id} onClick={()=>pickFromCatalog(prod)}
                        style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer",transition:"background .1s"}}
                        onMouseEnter={e=>e.currentTarget.style.background="rgba(96,165,250,0.1)"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        {prod.photoUrl&&<img src={prod.photoUrl.includes("gyazo.com")&&!prod.photoUrl.includes("i.gyazo")?`https://i.gyazo.com/${prod.photoUrl.split("/").pop()}.png`:prod.photoUrl} style={{width:36,height:36,borderRadius:6,objectFit:"cover",flexShrink:0}} onError={e=>e.target.style.display="none"}/>}
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontFamily:"'Sora',sans-serif",fontSize:13,color:"#0f172a",fontWeight:600,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{prod.name}</div>
                          <div style={{fontFamily:"'Sora',sans-serif",fontSize:11,color:"#1f2937",fontWeight:700,display:"flex",gap:10}}>
                            <span>{prod.priceUSD!=null?`U$D ${prod.priceUSD}`:ars(prod.price||0)}</span>

            <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>

                <div key={item.id} style={{display:"flex", alignItems:"center", gap:10, background:"#eef0f4", borderRadius:10, padding:"10px 12px", marginBottom:6, border:"1px solid #d4d8e2"}}>

                    <div style={{fontFamily:"'Sora',sans-serif", fontSize:11, color:"#374151", display:"flex", gap:10, flexWrap:"wrap"}}>

                      <span style={{color:"#4ade80"}}>Reserva: {ars(item.reserva)}{item.reservaUSD!=null&&<span style={{color:"#6ee7b7",marginLeft:4}}>(U$D {item.reservaUSD})</span>}</span>
                      <span style={{color:"#f87171"}}>Saldo: {ars(item.price-item.reserva)}</span>
                      {item.photoUrl&&<span style={{color:"#60a5fa"}}>📸 foto</span>}

                  <button onClick={()=>removeItem(item.id)} style={{background:"none", border:"none", color:"#374151", cursor:"pointer", padding:4}}><Icon name="trash" size={13}/></button>

              ))}
              <div style={{background:"rgba(59,130,246,0.08)", borderRadius:10, padding:"12px 14px", border:"1px solid rgba(59,130,246,0.15)", marginTop:8}}>
                <div style={{display:"flex", justifyContent:"space-between", fontFamily:"'Sora',sans-serif", fontSize:12, color:"#374151", marginBottom:4}}><span>Total</span><span style={{color:"#0f172a"}}>{ars(tp)}</span></div>
                <div style={{display:"flex", justifyContent:"space-between", fontFamily:"'Sora',sans-serif", fontSize:12, color:"#374151", marginBottom:4}}><span>Reserva</span><span style={{color:"#4ade80"}}>{ars(tr)}</span></div>
                <div style={{display:"flex", justifyContent:"space-between", fontFamily:"'Sora',sans-serif", fontSize:13, fontWeight:700, paddingTop:8, borderTop:"1px solid rgba(255,255,255,0.06)"}}><span style={{color:"#374151"}}>Saldo</span><span style={{color:"#f87171"}}>{ars(tp-tr)}</span></div>
              </div>

          <div style={{display:"flex", gap:10}}>

            <Btn variant="amber" disabled={items.length===0} onClick={()=>items.length>0&&onSave(items)} style={{flex:2, justifyContent:"center"}}>
              <Icon name="check" size={14}/>Guardar pedido
            </Btn>
          </div>
        </Modal>
      );

    // ─── EDIT ITEM MODAL ─────────────────────────────────────────────────────────
    function EditItemModal({ item, orderId, onSave, onClose }) {
      const [desc,    setDesc]    = useState(item.desc||"");
      const [priceUSD,setPriceUSD]= useState(item.priceUSD!=null);
      const [price,   setPrice]   = useState(item.priceUSD!=null ? item.priceUSD : item.price||0);
      const [reservaUSD,setReservaUSD]= useState(item.reservaUSD!=null);
      const [reserva, setReserva] = useState(item.reservaUSD!=null ? item.reservaUSD : item.reserva||0);
      const [costo,   setCosto]   = useState(item.costo!=null?item.costo:"");
      const [peso,    setPeso]    = useState(item.peso!=null?item.peso:"");
      const [photoUrl,setPhotoUrl]= useState(item.photoUrl||"");

      const CurrencyToggle = ({ isUSD, onToggle }) => (
        <div style={{display:"flex", background:"#e8eaf0", borderRadius:8, padding:2, gap:2}}>
          {[["ARS","$"],["USD","U$D"]].map(([cur,sym])=>(
            <button key={cur} onClick={()=>onToggle(cur==="USD")} style={{
              padding:"3px 10px", borderRadius:6, border:"none", cursor:"pointer",
              background:(isUSD===(cur==="USD"))?(cur==="USD"?"#16a34a":"#2563eb"):"transparent",
              color:(isUSD===(cur==="USD"))?"#fff":"#475569",
              fontFamily:"'Sora',sans-serif", fontSize:11, fontWeight:700
            }}>{sym} {cur}</button>
          ))}
        </div>
      );

      const handleSave = () => {
        const priceARS   = priceUSD   ? parseFloat(price)   * ARS_TO_USD : parseFloat(price)||0;
        const reservaARS = reservaUSD ? parseFloat(reserva) * ARS_TO_USD : parseFloat(reserva)||0;
        onSave(orderId, item.id, {
          desc: desc.trim(),
          price: priceARS,
          priceUSD: priceUSD ? parseFloat(price) : null,
          reserva: reservaARS,
          reservaUSD: reservaUSD ? parseFloat(reserva) : null,
          costo: costo!==""?parseFloat(costo):null,
          peso: peso!==""?parseFloat(peso):null,
          photoUrl: photoUrl.trim(),
        });
      };

      return (
        <Modal title="Editar producto" onClose={onClose} wide>
          <div style={{marginBottom:12}}>
            <label style={lbl}>Descripción</label>
            <input style={inp} value={desc} onChange={e=>setDesc(e.target.value)} placeholder="Nombre del producto" autoFocus/>
          </div>
          <div style={{marginBottom:12}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:5}}>
              <label style={{...lbl,marginBottom:0}}>Precio venta</label>
              <CurrencyToggle isUSD={priceUSD} onToggle={setPriceUSD}/>
            </div>
            <div style={{position:"relative"}}>
              <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#374151",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,pointerEvents:"none"}}>{priceUSD?"U$D":"$"}</div>
              <input style={{...inp,paddingLeft:36}} type="number" value={price} onChange={e=>setPrice(e.target.value)}/>
            </div>
            {priceUSD&&price&&<div style={{fontFamily:"'Sora',sans-serif",fontSize:11,color:"#1f2937",fontWeight:700,marginTop:4}}>= {ars(parseFloat(price)*ARS_TO_USD)} (a ${ARS_TO_USD}/U$D)</div>}
          </div>
          <div style={{marginBottom:12}}>
            <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:5}}>
              <label style={{...lbl,marginBottom:0}}>Reserva</label>
              <CurrencyToggle isUSD={reservaUSD} onToggle={setReservaUSD}/>
            </div>
            <div style={{position:"relative"}}>
              <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#374151",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,pointerEvents:"none"}}>{reservaUSD?"U$D":"$"}</div>
              <input style={{...inp,paddingLeft:36}} type="number" value={reserva} onChange={e=>setReserva(e.target.value)}/>
            </div>
            {reservaUSD&&reserva&&<div style={{fontFamily:"'Sora',sans-serif",fontSize:11,color:"#1f2937",fontWeight:700,marginTop:4}}>= {ars(parseFloat(reserva)*ARS_TO_USD)} (a ${ARS_TO_USD}/U$D)</div>}
          </div>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12}}>
            <div><label style={lbl}>Costo (USD)</label><input style={inp} type="number" value={costo} onChange={e=>setCosto(e.target.value)} placeholder="0.00"/></div>
            <div><label style={lbl}>Peso (kg)</label><input style={inp} type="number" value={peso} onChange={e=>setPeso(e.target.value)} placeholder="0.5"/></div>
          </div>
          <div style={{marginBottom:20}}>
            <label style={lbl}>Link de la foto</label>
            <div style={{position:"relative"}}>
              <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#374151",pointerEvents:"none"}}><Icon name="link" size={13}/></div>
              <input style={{...inp,paddingLeft:32}} value={photoUrl} onChange={e=>setPhotoUrl(e.target.value)} placeholder="https://gyazo.com/..."/>
            </div>
          </div>
          <div style={{display:"flex", gap:10}}>
            <Btn variant="ghost" onClick={onClose} style={{flex:1,justifyContent:"center"}}>Cancelar</Btn>
            <Btn variant="primary" onClick={handleSave} style={{flex:2,justifyContent:"center"}}>
              <Icon name="check" size={14}/>Guardar cambios
            </Btn>
          </div>
        </Modal>
      );
    }

    // ─── CLIENT DETAIL ───────────────────────────────────────────────────────────
    function ClientDetail({ client, orders=[], onBack, onAddOrder, onUpdateOrder, onDeleteOrder, onPrint }) {
      const [editPhoto,setEditPhoto] = useState(null);
      const [editItem,setEditItem]   = useState(null);
      const [ocultarPagados, setOcultarPagados] = useState(true);

      const saveEditedItem = (orderId, itemId, patch) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        const updatedItems = order.items.map(i => i.id===itemId ? {...i,...patch} : i);
        const tp = updatedItems.reduce((a,i)=>a+(i.price||0),0);
        const tr = updatedItems.reduce((a,i)=>a+(i.reserva||0),0);
        const ts = updatedItems.reduce((a,i)=>a+(i.pagado?0:(i.price||0)-(i.reserva||0)),0);
        onUpdateOrder(orderId,{items:updatedItems,totalPrice:tp,totalReserva:tr,totalSaldo:ts});
        setEditItem(null);
      };
      const clientOrders = orders.filter(o=>o.clientId===client.id);
      const totalPedido = clientOrders.reduce((a,o)=>a+o.totalPrice,0);
      const totalReservado = clientOrders.reduce((a,o)=>a+o.totalReserva,0);
      const totalSaldo = clientOrders.reduce((a,o)=>a+o.totalSaldo,0);
      const visibleOrders = ocultarPagados
        ? clientOrders.filter(o=>o.items.some(i=>!i.pagado))
        : clientOrders;
      const hiddenCount = clientOrders.length - visibleOrders.length;

      const togglePagado = (orderId,itemId) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        const updatedItems = order.items.map(i=>i.id===itemId?{...i,pagado:!i.pagado}:i);
        onUpdateOrder(orderId,{items:updatedItems, totalSaldo:updatedItems.reduce((a,i)=>a+(i.pagado?0:i.price-i.reserva),0), totalReserva:updatedItems.reduce((a,i)=>a+i.reserva,0)});
      };
      const toggleLlegado = (orderId,itemId) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        const updatedItems = order.items.map(i=>i.id===itemId?{...i,llegado:!i.llegado,enMiami:false,pedidoOnline:false}:i);
        onUpdateOrder(orderId,{items:updatedItems});
      };
      const toggleMostrarRemito = (orderId,itemId) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        const updatedItems = order.items.map(i=>i.id===itemId?{...i,mostrarRemito:!i.mostrarRemito}:i);
        onUpdateOrder(orderId,{items:updatedItems});
      };
      const toggleMiami = (orderId,itemId) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        const updatedItems = order.items.map(i=>i.id===itemId?{...i,enMiami:!i.enMiami,llegado:false,pedidoOnline:false}:i);
        onUpdateOrder(orderId,{items:updatedItems});
      };
      const togglePedidoOnline = (orderId,itemId) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        const updatedItems = order.items.map(i=>i.id===itemId?{...i,pedidoOnline:!i.pedidoOnline,llegado:false,enMiami:false}:i);
        onUpdateOrder(orderId,{items:updatedItems});
      };
      const savePhotoUrl = (orderId,itemId,url) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        onUpdateOrder(orderId,{items:order.items.map(i=>i.id===itemId?{...i,photoUrl:url}:i)});
        setEditPhoto(null);
      };

      const statusColors = {pendiente:"#f59e0b", confirmado:"#22c55e", cancelado:"#ef4444"};
      const statusLabels = {pendiente:"Pendiente", confirmado:"Confirmado", cancelado:"Cancelado"};

      return (
        <div>
          <div style={{display:"flex", alignItems:"center", gap:12, marginBottom:24, flexWrap:"wrap"}}>
            <button onClick={onBack} style={{background:"#e8eaf0", border:"1px solid #d4d8e2", borderRadius:10, padding:"8px 10px", cursor:"pointer", color:"#374151", display:"flex", alignItems:"center"}}>
              <Icon name="back" size={16}/>
            </button>
            <div style={{flex:1}}>
              <h2 style={{fontFamily:"'Sora',sans-serif", fontSize:22, color:"#0f172a", margin:0, fontWeight:800}}>{client.name}</h2>
              <div style={{display:"flex", alignItems:"center", gap:8, marginTop:6, flexWrap:"wrap"}}>
                {client.phone&&(
                  <a href={`https://wa.me/${client.phone.replace(/\D/g,"")}`} target="_blank" rel="noopener noreferrer"
                    style={{display:"inline-flex",alignItems:"center",gap:5,background:"#22c55e",borderRadius:8,padding:"4px 12px",textDecoration:"none",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:"#fff"}}>
                    💬 WhatsApp
                  </a>
                )}
                {client.address&&(
                  <a href={`https://maps.google.com/?q=${encodeURIComponent(client.address)}`} target="_blank" rel="noopener noreferrer"
                    style={{display:"inline-flex",alignItems:"center",gap:5,background:"#3b82f6",borderRadius:8,padding:"4px 12px",textDecoration:"none",fontFamily:"'Sora',sans-serif",fontSize:12,fontWeight:700,color:"#fff"}}>
                    📍 {client.address}
                  </a>
                )}
                {client.note&&<span style={{fontFamily:"'Sora',sans-serif",fontSize:11,color:"#64748b",fontStyle:"italic"}}>{client.note}</span>}
              </div>
            </div>
            <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
              <button onClick={()=>setOcultarPagados(p=>!p)} style={{
                padding:"6px 12px", borderRadius:8, cursor:"pointer", fontSize:11, fontWeight:600,
                fontFamily:"'Sora',sans-serif", display:"flex", alignItems:"center", gap:5,
                background: ocultarPagados?"rgba(34,197,94,0.15)":"rgba(255,255,255,0.05)",
                border: ocultarPagados?"1px solid rgba(34,197,94,0.3)":"1px solid rgba(255,255,255,0.08)",
                color: ocultarPagados?"#4ade80":"#64748b"
              }}>
                {ocultarPagados?"👁️ Mostrar pagados":"🙈 Ocultar pagados"}
              </button>
              <Btn variant="ghost" small onClick={onPrint}><Icon name="print" size={13}/>Imprimir remito</Btn>
              <Btn variant="amber" small onClick={onAddOrder}><Icon name="plus" size={13}/>Nuevo pedido</Btn>
            </div>
          </div>

          <div style={{display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:10, marginBottom:24}}>
            <StatCard label="Total pedidos" value={ars(totalPedido)} color="#3b82f6" icon={<Icon name="bag" size={14}/>}/>
            <StatCard label="Reservado" value={ars(totalReservado)} color="#22c55e" icon={<Icon name="check" size={14}/>}/>
            <StatCard label="Saldo pendiente" value={ars(totalSaldo)} color="#f87171" icon={<Icon name="dollar" size={14}/>}/>
          </div>

          {clientOrders.length===0 ? (
            <div style={{textAlign:"center", padding:"50px 20px", color:"#374151", fontFamily:"'Sora',sans-serif", fontSize:14}}>
              <div style={{fontSize:40, marginBottom:12}}>📭</div>No hay pedidos todavía.
              <br/><button onClick={onAddOrder} style={{marginTop:14, background:"none", border:"1px dashed #334155", borderRadius:10, padding:"9px 18px", color:"#374151", cursor:"pointer", fontFamily:"'Sora',sans-serif", fontSize:13}}>+ Agregar primer pedido</button>
            </div>
          ) : (
            <>
              {ocultarPagados && hiddenCount>0 && (
                <div style={{background:"rgba(34,197,94,0.07)",border:"1px solid rgba(34,197,94,0.15)",borderRadius:10,padding:"10px 16px",marginBottom:12,fontFamily:"'Sora',sans-serif",fontSize:12,color:"#4ade80",display:"flex",alignItems:"center",gap:8}}>
                  ✓ {hiddenCount} pedido{hiddenCount!==1?"s":""} completamente pagado{hiddenCount!==1?"s":""} oculto{hiddenCount!==1?"s":""}
                  <button onClick={()=>setOcultarPagados(false)} style={{background:"none",border:"none",color:"#4ade80",cursor:"pointer",textDecoration:"underline",fontFamily:"'Sora',sans-serif",fontSize:11}}>Mostrar</button>
                </div>
              )}
              {[...visibleOrders].reverse().map(order=>(
            <div key={order.id} style={{background:"#eef0f4", borderRadius:16, padding:18, border:"1px solid #d4d8e2", marginBottom:12}}>
              <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8}}>
                <div style={{fontFamily:"'Sora',sans-serif", fontSize:12, color:"#374151"}}>{order.date}</div>

    // ─── PHOTO TOOLTIP ───────────────────────────────────────────────────────────
    // Convert share links to direct image embed links
    const toDirectImg = url => {
      if (!url) return null;
      // Gyazo: https://gyazo.com/HASH → https://i.gyazo.com/HASH.png
      const gyazo = url.match(/gyazo\.com\/([a-zA-Z0-9]+)(?:\?|$)/);
      if (gyazo) return `https://i.gyazo.com/${gyazo[1]}.png`;
      // i.gyazo.com direct link already
      if (url.includes("i.gyazo.com")) return url;
      // Google Drive: /file/d/FILE_ID/
      const driveFile = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/);
      if (driveFile) return `https://drive.google.com/thumbnail?id=${driveFile[1]}&sz=w400`;
      // Google Drive: ?id=FILE_ID
      const driveOpen = url.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if (driveOpen && url.includes("drive.google.com")) return `https://drive.google.com/thumbnail?id=${driveOpen[1]}&sz=w400`;
      // Dropbox
      if (url.includes("dropbox.com")) return url.replace("dl=0","raw=1").replace("www.dropbox","dl.dropboxusercontent");
      // Direct image URLs
      if (/\.(jpe?g|png|webp|gif)(\?|$)/i.test(url)) return url;
      return null;
    };

    function PhotoTooltip({ url }) {
      const [show, setShow] = useState(false);
      const [pos, setPos] = useState({x:0, y:0});
      const [loaded, setLoaded] = useState(false);
      const [error, setError] = useState(false);

      const directUrl = toDirectImg(url);

      const handleMouseEnter = e => {
        setShow(true); setLoaded(false); setError(false);
        setPos({ x: e.clientX, y: e.clientY });
      };
      const handleMouseMove = e => setPos({ x: e.clientX, y: e.clientY });
      const handleMouseLeave = () => setShow(false);

      const tooltipTop  = pos.y > 240 ? pos.y - 220 : pos.y + 24;
      const tooltipLeft = Math.min(Math.max(pos.x - 95, 8), window.innerWidth - 210);

      return (
        <>
          <button
            onMouseEnter={handleMouseEnter}
            onMouseMove={handleMouseMove}
            onMouseLeave={handleMouseLeave}
            onClick={()=>window.open(url,"_blank")}
            style={{
              background:"rgba(96,165,250,0.15)", border:"1px solid rgba(96,165,250,0.3)",
              borderRadius:6, padding:"3px 7px", cursor:"pointer",

            }}
          >
            <Icon name="image" size={11}/> 📸
          </button>

          {show && (
            <div style={{
              position:"fixed", left:tooltipLeft, top:tooltipTop,

                    onLoad={()=>setLoaded(true)}
                    onError={()=>setError(true)}
                    style={{display:loaded?"block":"none",width:"100%",borderRadius:7,maxHeight:220,objectFit:"cover"}}
                  />
                </>
              ) : (
                <div style={{padding:"10px 8px",textAlign:"center"}}>
                  <div style={{fontSize:24,marginBottom:6}}>🔗</div>
                  <div style={{fontSize:11,color:"#1f2937",fontWeight:700,marginBottom:4}}>Clic para abrir la foto</div>

                  <div style={{marginTop:8,fontSize:10,color:"#1f2937",fontWeight:700,background:"#e8eaf0",borderRadius:6,padding:"4px 8px"}}>

    // ─── PLANILLA VIEW ───────────────────────────────────────────────────────────
    const USD_POR_KG = 40;
    const ARS_TO_USD = 1550; // tipo de cambio fijo

    function EditableCell({ value, onSave, prefix="", suffix="", color="#e2e8f0" }) {
      const [editing, setEditing] = useState(false);
      const [val, setVal] = useState(value ?? "");
      const ref = useRef();
      useEffect(()=>{ if(editing) ref.current?.select(); },[editing]);
      const commit = () => {
        setEditing(false);
        const parsed = val===""?null:parseFloat(val);
        if(parsed !== value) onSave(parsed);
      };
      if(editing) return (
        <input ref={ref} type="number" value={val} onChange={e=>setVal(e.target.value)}
          onBlur={commit} onKeyDown={e=>{if(e.key==="Enter")commit();if(e.key==="Escape"){setEditing(false);setVal(value??"")}}}
          style={{width:"100%",background:"rgba(255,255,255,0.12)",border:"1.5px solid #a78bfa",borderRadius:6,
            padding:"4px 6px",color:"#f0e6ff",fontFamily:"'Sora',sans-serif",fontSize:12,outline:"none",
            textAlign:"right",minWidth:65}}/>
      );
      return (
        <div onClick={()=>setEditing(true)} title="Clic para editar"
          style={{cursor:"pointer",color,fontFamily:"'Sora',sans-serif",fontSize:12,
            padding:"2px 4px",borderRadius:5,transition:"background .1s",whiteSpace:"nowrap",
            borderBottom:"1px dashed rgba(167,139,250,0.3)"}}
          onMouseEnter={e=>e.currentTarget.style.background="rgba(167,139,250,0.1)"}
          onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
          {value!=null?`${prefix}${value.toLocaleString("es-AR")}${suffix}`:<span style={{color:"#374151"}}>— editar</span>}
        </div>
      );
    }

    function PlanillaView({ clients=[], orders=[], onUpdateOrder }) {
      const [search, setSearch] = useState("");
      const [filtro, setFiltro] = useState("todos");
      const [showResumen, setShowResumen] = useState(false);
      const usd = n => n!=null?`U$D ${parseFloat(n).toFixed(2)}`:"—";

      const rows = clients.flatMap(client => {
        const cOrders = orders.filter(o=>o.clientId===client.id&&o.status!=="cancelado");
        return cOrders.flatMap(order=>order.items.map(item=>{
          const costoEnvio = item.peso!=null ? item.peso*USD_POR_KG : null;
          const costoTotal = (item.costo!=null||costoEnvio!=null) ? (item.costo||0)+(costoEnvio||0) : null;
          // Price in USD: use stored priceUSD if available, else convert from ARS
          const priceInUSD = item.priceUSD!=null ? item.priceUSD : (item.price||0)/ARS_TO_USD;
          const ganancia   = costoTotal!=null ? priceInUSD - costoTotal : null;
          return {
            orderId:order.id, itemId:item.id,
            clientName:client.name, clientPhone:client.phone||"", clientId:client.id,
            desc:item.desc, price:item.price||0, reserva:item.reserva||0,
            priceUSD:item.priceUSD??null, reservaUSD:item.reservaUSD??null,
            saldo:item.pagado?0:(item.price||0)-(item.reserva||0),
            costo:item.costo??null, peso:item.peso??null, costoEnvio, ganancia,
            photoUrl:item.photoUrl||null,
            pagado:!!item.pagado, llegado:!!item.llegado,
            enMiami:!!item.enMiami, pedidoOnline:!!item.pedidoOnline, date:order.date,
          };
        }));
      });

      const filtered = rows.filter(r=>{
        const ms = r.clientName.toLowerCase().includes(search.toLowerCase())||r.desc.toLowerCase().includes(search.toLowerCase());
        if(!ms) return false;
        if(filtro==="con_saldo") return !r.pagado&&r.saldo>0;
        if(filtro==="llegados")  return r.llegado;
        if(filtro==="miami")     return r.enMiami;
        if(filtro==="online")    return r.pedidoOnline;
        return true;
      }).sort((a,b)=>a.clientName.localeCompare(b.clientName,"es"));

      const patchItem = (orderId,itemId,patch) => {
        const order = orders.find(o=>o.id===orderId); if(!order) return;
        const updatedItems = order.items.map(i=>i.id===itemId?{...i,...patch}:i);
        const tp = updatedItems.reduce((a,i)=>a+(i.price||0),0);
        const tr = updatedItems.reduce((a,i)=>a+(i.reserva||0),0);
        const ts = updatedItems.reduce((a,i)=>a+(i.pagado?0:(i.price||0)-(i.reserva||0)),0);
        onUpdateOrder(orderId,{items:updatedItems,totalPrice:tp,totalReserva:tr,totalSaldo:ts});
      };

      const totalVentas  = filtered.reduce((a,r)=>a+r.price,0);
      const totalCobrado = filtered.reduce((a,r)=>a+r.reserva,0);
      const totalSaldos  = filtered.reduce((a,r)=>a+r.saldo,0);
      const totalCosto   = filtered.filter(r=>r.costo!=null).reduce((a,r)=>a+r.costo,0);
      const totalEnvio   = filtered.filter(r=>r.costoEnvio!=null).reduce((a,r)=>a+r.costoEnvio,0);
      const totalGanancia= filtered.filter(r=>r.ganancia!=null).reduce((a,r)=>a+r.ganancia,0);
      const totalPeso    = filtered.filter(r=>r.peso!=null).reduce((a,r)=>a+r.peso,0);

      const clientSummary = {};
      filtered.forEach(r=>{
        if(!clientSummary[r.clientId]) clientSummary[r.clientId]={name:r.clientName,total:0,cobrado:0,saldo:0,items:0};
        clientSummary[r.clientId].total+=r.price; clientSummary[r.clientId].cobrado+=r.reserva;
        clientSummary[r.clientId].saldo+=r.saldo; clientSummary[r.clientId].items++;
      });

      const th=(label,align="left",minW=0)=>(
        <th style={{background:"#4f46e5",color:"#312e81",padding:"9px 10px",fontSize:10,textAlign:align,
          letterSpacing:0.7,textTransform:"uppercase",fontFamily:"'Sora',sans-serif",fontWeight:700,
          whiteSpace:"nowrap",borderBottom:"2px solid rgba(167,139,250,0.3)",minWidth:minW||"auto"}}>{label}</th>
      );

      return (
        <div>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:12,flexWrap:"wrap"}}>
            <div>
              <h2 style={{fontFamily:"'Sora',sans-serif",fontSize:18,color:"#0f172a",margin:0,fontWeight:800}}>Planilla general</h2>
              <div style={{fontFamily:"'Sora',sans-serif",fontSize:11,color:"#1f2937",fontWeight:700}}>
                {filtered.length} productos · {Object.keys(clientSummary).length} clientas
                <span style={{marginLeft:8,color:"rgba(167,139,250,0.5)"}}>· Tocá precio, reserva, costo o peso para editar</span>
              </div>
            </div>
          </div>

          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            {/* Stat pills - compact horizontal */}
            {[
              {label:"Ventas", val:<span>U$D {(totalVentas/ARS_TO_USD).toFixed(0)}<span style={{fontSize:10,color:"#c4b5fd",marginLeft:4}}>{ars(totalVentas)}</span></span>, color:"#a78bfa"},
              {label:"Cobrado", val:<span>U$D {(totalCobrado/ARS_TO_USD).toFixed(0)}<span style={{fontSize:10,color:"#86efac",marginLeft:4}}>{ars(totalCobrado)}</span></span>, color:"#22c55e"},
              {label:"Saldo", val:<span>U$D {(totalSaldos/ARS_TO_USD).toFixed(0)}<span style={{fontSize:10,color:"#fca5a5",marginLeft:4}}>{ars(totalSaldos)}</span></span>, color:"#f87171"},
              {label:"Costo", val:usd(totalCosto||null), color:"#fb923c"},
              {label:`Envío x${USD_POR_KG}`, val:usd(totalEnvio||null), color:"#f59e0b"},
              {label:"Ganancia", val:totalGanancia>0?<span>U$D {totalGanancia.toFixed(0)}<span style={{fontSize:10,color:"#6ee7b7",marginLeft:4}}>{ars(totalGanancia*ARS_TO_USD)}</span></span>:"—", color:"#34d399"},
              {label:"Peso", val:totalPeso>0?`${totalPeso.toFixed(2)} kg`:"—", color:"#60a5fa"},
            ].map(({label,val,color})=>(
              <div key={label} style={{background:"#f5f6f9",border:`1px solid ${color}22`,borderRadius:10,padding:"9px 18px",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
                <span style={{fontFamily:"'Sora',sans-serif",fontSize:11,color:"#1f2937",fontWeight:700,textTransform:"uppercase",letterSpacing:0.7,fontWeight:600,whiteSpace:"nowrap"}}>{label}</span>

              </div>

          </div>

          <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <div style={{position:"relative",flex:1,minWidth:180}}>
              <div style={{position:"absolute",left:11,top:"50%",transform:"translateY(-50%)",color:"#374151",pointerEvents:"none"}}><Icon name="search" size={14}/></div>
              <input style={{width:"100%",background:"#e8eaf0",border:"1.5px solid rgba(255,255,255,0.1)",borderRadius:10,padding:"9px 13px 9px 33px",color:"#0f172a",fontFamily:"'Sora',sans-serif",fontSize:13,fontWeight:600,outline:"none",boxSizing:"border-box"}}

            </div>
            {[["todos","Todos"],["con_saldo","Con saldo"],["llegados","✈️ ARG"],["miami","🌴 Miami"],["online","🛒 Online"]].map(([val,label])=>(

          {filtered.length===0?(

                </thead>
                <tbody>
                  {filtered.map((row,idx)=>{
                    const isFirstOfClient = idx===0 || filtered[idx-1].clientId !== row.clientId;
                    const clientRowCount = filtered.filter(r=>r.clientId===row.clientId).length;
                    // Row background by state
                    const bg = row.llegado      ? "rgba(34,197,94,0.07)"
                             : row.enMiami      ? "rgba(100,116,139,0.12)"
                             : row.pedidoOnline ? "rgba(234,179,8,0.07)"
                             : row.pagado       ? "rgba(34,197,94,0.04)"
                             : idx%2===0        ? "rgba(255,255,255,0.02)" : "transparent";
                    const prodBg    = row.llegado  ? "rgba(34,197,94,0.15)"
                                    : row.enMiami  ? "rgba(100,116,139,0.2)"
                                    : row.pedidoOnline ? "rgba(234,179,8,0.15)"
                                    : "transparent";
                    const prodColor = row.llegado  ? "#4ade80"

                    const fmtPrice   = row.priceUSD!=null
                      ? <span>U$D {row.priceUSD.toLocaleString("es-AR")}<span style={{display:"block",fontSize:10,color:"#1f2937",fontWeight:700}}>{ars(row.price)}</span></span>
                      : <span>{ars(row.price)}</span>;
                    const fmtReserva = row.reservaUSD!=null
                      ? <span>U$D {row.reservaUSD.toLocaleString("es-AR")}<span style={{display:"block",fontSize:10,color:"#1f2937",fontWeight:700}}>{ars(row.reserva)}</span></span>
                      : <span>{ars(row.reserva)}</span>;
                    return (
                      <tr key={`${row.orderId}-${row.itemId}`} style={{
                        background:bg,
                        borderBottom:"1px solid rgba(255,255,255,0.04)",
                        borderTop: isFirstOfClient && idx>0 ? "2px solid rgba(167,139,250,0.15)" : "none"
                      }}>
                        {/* Client name - only on first row, rowspan */}
                        {isFirstOfClient && (
                          <td rowSpan={clientRowCount} style={{
                            padding:"12px 12px", fontFamily:"'Sora',sans-serif", fontSize:14,
                            color:"#0f172a", fontWeight:800, whiteSpace:"nowrap",

                            {row.clientName}
